<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#12323a" />
  <title>منصة كهربائيات | Power Engineering Toolkit</title>
  <meta name="description" content="منصة أدوات هندسية للكهرباء: حاسبات، مشاريع، مراجع، جداول ومعادلات لمهندسي القوى الكهربائية." />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f3;
      --surface: #ffffff;
      --surface-2: #eef3ef;
      --ink: #10242a;
      --muted: #627176;
      --line: #d9e1de;
      --teal: #0d6b72;
      --teal-2: #12323a;
      --amber: #c9882b;
      --red: #b94747;
      --green: #2f7d54;
      --blue: #315d9a;
      --shadow: 0 20px 55px rgba(16, 36, 42, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(13, 107, 114, .08), transparent 34%),
        linear-gradient(315deg, rgba(201, 136, 43, .10), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      letter-spacing: 0;
    }
    body[dir="ltr"] { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 18px 0 28px; }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      background: rgba(255, 255, 255, .84);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(12px);
    }
    .brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, var(--amber), #e3bc6b, var(--teal), var(--teal-2), var(--amber));
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, .72);
    }
    .mark svg { width: 34px; height: 34px; fill: white; filter: drop-shadow(0 3px 6px rgba(0,0,0,.22)); }
    h1 { margin: 0; font-size: clamp(1.25rem, 2.5vw, 2rem); line-height: 1.2; }
    .subtitle { margin: 5px 0 0; color: var(--muted); font-size: .95rem; font-weight: 600; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn, .primary-btn, .ghost-btn, .danger-btn {
      border: 1px solid transparent;
      border-radius: var(--radius);
      min-height: 40px;
      padding: 9px 13px;
      font-weight: 800;
      transition: .18s ease;
    }
    .icon-btn { width: 42px; padding: 0; display: grid; place-items: center; background: var(--surface-2); border-color: var(--line); color: var(--teal-2); }
    .primary-btn { background: var(--teal); color: white; }
    .ghost-btn { background: var(--surface); border-color: var(--line); color: var(--teal-2); }
    .danger-btn { background: rgba(185, 71, 71, .12); border-color: rgba(185, 71, 71, .22); color: var(--red); }
    .icon-btn:hover, .ghost-btn:hover { border-color: var(--teal); transform: translateY(-1px); }
    .primary-btn:hover { background: var(--teal-2); transform: translateY(-1px); }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 16px 0;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
    }
    .tab {
      border: 0;
      min-height: 46px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tab.active { background: var(--teal-2); color: white; box-shadow: 0 10px 24px rgba(18, 50, 58, .22); }
    .tab:not(.active):hover { background: var(--surface-2); color: var(--ink); }

    .section { display: none; }
    .section.active { display: block; animation: rise .25s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .dashboard {
      display: grid;
      grid-template-columns: 1.3fr repeat(3, minmax(0, .75fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary-card {
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 35px rgba(16,36,42,.07);
      padding: 15px;
      min-height: 102px;
    }
    .summary-card.featured {
      background: linear-gradient(135deg, rgba(18,50,58,.96), rgba(13,107,114,.92));
      color: white;
      border-color: rgba(255,255,255,.15);
    }
    .summary-card.featured p { color: rgba(255,255,255,.76); }
    .summary-card span { display: block; color: var(--muted); font-size: .78rem; font-weight: 850; }
    .summary-card strong { display: block; margin-top: 7px; font-size: clamp(1.25rem, 2vw, 1.65rem); color: var(--teal-2); }
    .summary-card.featured strong { color: white; }
    .summary-card p { margin: 8px 0 0; color: var(--muted); line-height: 1.55; }
    .category-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      color: var(--teal-2);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 850;
    }
    .chip.active { background: var(--teal-2); color: white; border-color: var(--teal-2); }
    .category-title {
      margin: 18px 0 10px;
      color: var(--teal-2);
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
      grid-column: 1 / -1;
    }
    .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .tool-card, .panel, .ref-card, .project-card {
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 35px rgba(16,36,42,.07);
    }
    .tool-card {
      min-height: 132px;
      padding: 16px;
      text-align: start;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      position: relative;
      overflow: hidden;
    }
    .tool-card::after {
      content: "";
      position: absolute;
      inset-block-end: 0;
      inset-inline: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      opacity: .75;
    }
    .tool-card:hover { transform: translateY(-3px); border-color: rgba(13,107,114,.45); }
    .tool-icon, .small-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--teal);
    }
    .tool-icon svg, .small-icon svg, .mini svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-card h3, .ref-card h3, .project-card h3 { margin: 0 0 6px; font-size: 1.05rem; }
    .tool-card p, .muted { margin: 0; color: var(--muted); line-height: 1.65; }

    .panel { margin-top: 14px; padding: 18px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .panel-head h2 { margin: 0; font-size: 1.35rem; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    label { display: block; margin-bottom: 6px; color: var(--teal-2); font-size: .88rem; font-weight: 850; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 10px 11px;
      min-height: 42px;
      outline: 0;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,107,114,.15); }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .calculator-note {
      margin: 0 0 14px;
      padding: 11px 12px;
      border: 1px solid rgba(201,136,43,.28);
      border-radius: var(--radius);
      background: rgba(201,136,43,.10);
      color: #71521c;
      line-height: 1.6;
    }
    .save-box {
      margin-top: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
    }
    .result {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      background: linear-gradient(135deg, rgba(13,107,114,.09), rgba(201,136,43,.10));
      border: 1px solid rgba(13,107,114,.22);
      border-radius: var(--radius);
      padding: 12px;
    }
    .result.warning { background: rgba(185, 71, 71, .09); border-color: rgba(185, 71, 71, .25); }
    .metric span { display: block; color: var(--muted); font-size: .76rem; font-weight: 800; }
    .metric strong { display: block; margin-top: 3px; font-size: clamp(1rem, 1.8vw, 1.35rem); color: var(--teal-2); }

    .load-row { display: grid; grid-template-columns: 1.5fr .8fr .8fr 42px; gap: 8px; margin-bottom: 8px; align-items: end; }
    .load-row .danger-btn {
      width: 42px;
      min-height: 42px;
      padding: 0;
    }
    .load-field label {
      display: none;
      margin-bottom: 4px;
      font-size: .78rem;
    }
    .load-head {
      display: grid;
      grid-template-columns: 1.5fr .8fr .8fr 42px;
      gap: 8px;
      margin: 12px 0 6px;
      color: var(--teal-2);
      font-size: .82rem;
      font-weight: 900;
    }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .section-head h2 { margin: 0; font-size: 1.35rem; }
    .empty {
      text-align: center;
      padding: 46px 18px;
      background: rgba(255,255,255,.72);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
    }
    .projects-grid, .refs-grid, .formula-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .project-card, .ref-card { padding: 16px; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; font-size: .75rem; font-weight: 850; background: var(--surface-2); color: var(--teal-2); }
    .badge.planning { color: #79510e; background: rgba(201,136,43,.16); }
    .badge.active { color: var(--green); background: rgba(47,125,84,.14); }
    .badge.hold { color: #9a5b2f; background: rgba(154,91,47,.14); }
    .badge.done { color: var(--blue); background: rgba(49,93,154,.14); }
    .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
    .project-meta { display: grid; gap: 6px; margin: 12px 0; color: var(--muted); }
    .project-controls { display: flex; gap: 8px; }
    .project-controls button { flex: 1; }
    .saved-results {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .saved-result {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 10px;
    }
    .saved-result strong { display: block; margin-bottom: 4px; color: var(--teal-2); }
    .saved-result small { display: block; color: var(--muted); margin-top: 4px; }
    .lighting-sketch {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
    }
    .sketch-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .sketch-actions strong { color: var(--teal-2); }
    .sketch-plan {
      width: 100%;
      min-height: 320px;
      border: 2px solid rgba(13,107,114,.45);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(13,107,114,.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(13,107,114,.05) 1px, transparent 1px),
        rgba(238,243,239,.65);
      background-size: 28px 28px;
    }
    .fixture-card {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(238,243,239,.7);
    }
    .fixture-card div {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
    }
    .fixture-card span { display: block; color: var(--muted); font-size: .76rem; font-weight: 850; }
    .fixture-card strong { display: block; margin-top: 4px; color: var(--teal-2); }
    .plan-print-summary {
      margin: 10px 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .plan-print-summary div {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 9px 10px;
    }
    .plan-print-summary span { display: block; color: var(--muted); font-size: .74rem; font-weight: 850; }
    .plan-print-summary strong { display: block; margin-top: 3px; color: var(--teal-2); }
    .brand-list {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(201,136,43,.25);
      background: rgba(201,136,43,.08);
      border-radius: var(--radius);
      color: #71521c;
      line-height: 1.65;
    }
    .brand-list a { color: #6c4a08; font-weight: 900; text-decoration: underline; text-underline-offset: 3px; }
    .sketch-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.6;
    }

    .ref-card ul, .formula-card ul { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .ref-card li { padding-inline-start: 18px; position: relative; color: var(--muted); line-height: 1.55; }
    .ref-card li::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--amber); position: absolute; inset-inline-start: 0; top: .63em; }
    .formula-card { padding: 16px; background: rgba(255,255,255,.88); border: 1px solid var(--line); border-radius: var(--radius); }
    .formula-card code { display: block; direction: ltr; text-align: left; padding: 9px 10px; background: #12242b; color: #dff5ee; border-radius: var(--radius); white-space: normal; }

    .table-panel { background: rgba(255,255,255,.88); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .table-tools {
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .table-panel h3 { margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 520px; }
    th, td { text-align: start; padding: 11px 14px; border-bottom: 1px solid var(--line); }
    th { color: var(--teal-2); background: var(--surface-2); font-size: .88rem; }
    td { color: var(--muted); }
    td strong { color: var(--ink); }
    .size-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; padding: 14px; }
    .size-grid span { padding: 11px 8px; text-align: center; border-radius: var(--radius); background: var(--surface-2); color: var(--teal-2); font-weight: 900; }

    .footer {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      background: var(--teal-2);
      color: white;
      border-radius: var(--radius);
    }
    .footer p { margin: 4px 0 0; color: rgba(255,255,255,.72); }
    .footer a, .footer .contact span { color: white; text-decoration: none; font-weight: 850; }
    .contact { display: flex; gap: 10px; flex-wrap: wrap; justify-content: end; }

    dialog {
      width: min(540px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0;
    }
    dialog::backdrop { background: rgba(16, 36, 42, .48); backdrop-filter: blur(3px); }
    .modal-body { padding: 18px; }
    .modal-body h3 { margin: 0 0 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .modal-actions button { flex: 1; }

    .hidden { display: none !important; }
    .note { margin-top: 8px; color: var(--muted); font-size: .82rem; }
    .ltr { direction: ltr; unicode-bidi: embed; }
    .report-paper { display: grid; gap: 12px; }
    .report-paper h4 { margin: 0; color: var(--teal-2); }
    .report-paper ul { margin: 0; padding-inline-start: 20px; }
    body.print-plan .shell > header,
    body.print-plan .tabs,
    body.print-plan .dashboard,
    body.print-plan .category-strip,
    body.print-plan .card-grid,
    body.print-plan .panel-head,
    body.print-plan .calculator-note,
    body.print-plan .form-grid,
    body.print-plan .row-actions,
    body.print-plan .save-box,
    body.print-plan .footer,
    body.print-plan .result,
    body.print-plan .note:not(.plan-note) {
      display: none !important;
    }
    body.print-plan .section:not(#section-calculators) { display: none !important; }
    body.print-plan #section-calculators { display: block !important; }
    body.print-plan #calculatorPanel {
      display: block !important;
      box-shadow: none;
      border: 0;
      margin: 0;
      padding: 0;
    }
    body.print-plan .lighting-sketch { border: 0; padding: 0; }

    @media (max-width: 900px) {
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .result { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .size-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .shell { width: min(100% - 20px, 1180px); padding-top: 10px; padding-bottom: 92px; }
      .topbar, .footer { grid-template-columns: 1fr; }
      .actions, .contact { justify-content: stretch; }
      .actions button, .contact a, .contact span { flex: 1; }
      .tabs {
        position: sticky;
        bottom: 8px;
        z-index: 20;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
        box-shadow: var(--shadow);
      }
      .tab { font-size: .72rem; min-height: 46px; padding: 6px 2px; flex-direction: column; gap: 3px; }
      .mini svg { width: 19px; height: 19px; }
      .dashboard, .table-tools, .save-box { grid-template-columns: 1fr; }
      .fixture-card { grid-template-columns: 1fr; }
      .plan-print-summary { grid-template-columns: 1fr 1fr; }
      .sketch-plan { min-height: 240px; }
      .card-grid, .projects-grid, .refs-grid, .formula-grid, .form-grid { grid-template-columns: 1fr; }
      .load-head { display: none; }
      .load-field label { display: block; }
      .load-row { grid-template-columns: 1fr; }
      .load-row .danger-btn { width: 100%; }
      .load-row .remove-load { grid-column: auto; }
      .result { grid-template-columns: 1fr; }
      .brand { align-items: start; }
      .mark { width: 48px; height: 48px; }
    }
    @media print {
      body { background: white; }
      .topbar, .tabs, .footer, .actions, .project-controls, .modal-actions { display: none !important; }
      dialog { position: static; width: 100%; box-shadow: none; border: 0; }
      dialog::backdrop { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-13h-7l0-7z"/></svg>
        </div>
        <div>
          <h1 data-i18n="appTitle">منصة كهربائيات</h1>
          <p class="subtitle" data-i18n="appSubtitle">حاسبات • مشاريع • مراجع تقنية • جداول ومعادلات</p>
        </div>
      </div>
      <div class="actions">
        <button class="ghost-btn" id="langToggle" type="button">EN</button>
        <button class="icon-btn" id="aboutBtn" type="button" title="عن المنصة" aria-label="عن المنصة">
          <span>i</span>
        </button>
      </div>
    </header>

    <nav class="tabs" aria-label="الأقسام">
      <button class="tab active" data-tab="calculators" type="button"><span class="mini" data-icon="calculator"></span><span data-i18n="tabCalc">الحاسبات</span></button>
      <button class="tab" data-tab="projects" type="button"><span class="mini" data-icon="clipboard"></span><span data-i18n="tabProjects">المشاريع</span></button>
      <button class="tab" data-tab="references" type="button"><span class="mini" data-icon="book"></span><span data-i18n="tabReferences">المراجع</span></button>

    function n(id) { return Number(document.getElementById(id).value) || 0; }
    function fmt(value, digits = 2) { return Number.isFinite(value) ? value.toFixed(digits) : '-'; }
    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }
    function standardAtLeast(list, value, fallback) { return list.find(x => x >= value) ?? fallback; }

    function plainMetrics(items) {
      return items.map(i => i.label + ': ' + i.value).join(' | ');

    }

    function publishResult(calcId, title, items, warning = false, note = '') {
      const html = metrics(items, warning) + (note ? '<p class="note">' + note + '</p>' : '');
      document.getElementById(calcId + '_result').innerHTML = html;
      state.lastResult = {
        calcId,
        title,
        summary: plainMetrics(items),
        note,
        at: new Date().toLocaleString(state.lang === 'ar' ? 'ar-SA' : 'en-US')
      };
      const saveBox = document.getElementById(calcId + '_save');
      if (saveBox) {

        return '<div class="form-grid">' + field('co_p', L('القدرة (kW)', 'Power (kW)'), 2) + field('co_h', L('ساعات/يوم', 'Hours/day'), 8) + field('co_d', L('أيام التشغيل', 'Days'), 30) + field('co_r', L('سعر kWh', 'Price per kWh'), .18, 'number', 'step="0.01"') + field('co_cur', L('العملة', 'Currency'), 'SAR', 'text') + '</div>' + calcButton('calc_cost', L('احسب', 'Calculate'));
      }
    };

    function renderCalculators() {
      renderCalculatorCategories();
      const list = state.activeCategory === 'all' ? calculators : calculators.filter(c => c.category === state.activeCategory);
      const grouped = state.activeCategory === 'all' ? categories.filter(c => c.id !== 'all') : categories.filter(c => c.id === state.activeCategory);
      document.getElementById('calculatorGrid').innerHTML = grouped.map(group => {

      }).join('');
      document.querySelectorAll('[data-calc]').forEach(btn => btn.addEventListener('click', () => openCalc(btn.dataset.calc)));
    }
    function renderCalculatorCategories() {
      document.getElementById('calculatorCategories').innerHTML = categories.map(c => '<button class="chip ' + (state.activeCategory === c.id ? 'active' : '') + '" type="button" data-category="' + c.id + '">' + L(c.ar, c.en) + '</button>').join('');
      document.querySelectorAll('[data-category]').forEach(btn => btn.onclick = () => {
        state.activeCategory = btn.dataset.category;

    function renderDashboard() {
      const projects = loadProjects();
      const resultCount = projects.reduce((sum, p) => sum + ((p.results || []).length), 0);
      const active = projects.filter(p => p.status === 'active').length;
      const lastProject = projects[projects.length - 1];
      const lastResult = state.lastResult ? state.lastResult.title : L('لا توجد نتيجة بعد','No result yet');
      document.getElementById('dashboard').innerHTML =
        '<article class="summary-card featured"><span>' + L('مساحة العمل','Workspace') + '</span><strong>' + L('جاهزة للتصميم المبدئي','Ready for preliminary design') + '</strong><p>' + L('ابدأ بالحمل ثم الكابل والهبوط، واحفظ النتائج داخل المشروع لإخراج تقرير مرتب.', 'Start with load, cable and voltage drop, then save results to a project for a clean report.') + '</p></article>' +
        '<article class="summary-card"><span>' + L('المشاريع','Projects') + '</span><strong>' + projects.length + '</strong><p>' + L('النشط: ','Active: ') + active + '</p></article>' +
        '<article class="summary-card"><span>' + L('النتائج المحفوظة','Saved results') + '</span><strong>' + resultCount + '</strong><p>' + esc(lastResult) + '</p></article>' +
        '<article class="summary-card"><span>' + L('آخر مشروع','Latest project') + '</span><strong>' + esc(lastProject ? lastProject.name : L('لا يوجد','None')) + '</strong><p>' + (lastProject ? statusLabel(lastProject.status) : L('أضف مشروعك الأول','Add your first project')) + '</p></article>';
    }

    function openCalc(id) {
      state.activeCalc = id;
      const calc = calculators.find(c => c.id === id);
      document.getElementById('calculatorPanel').classList.remove('hidden');
      document.getElementById('calculatorTitle').textContent = L(calc.ar, calc.en);
      document.getElementById('calculatorBody').innerHTML = '<p class="calculator-note">' + L(calc.noteAr, calc.noteEn) + '</p>' + forms[id]();
      attachHandlers(id);
      document.getElementById('calculatorPanel').scrollIntoView({ block: 'start' });
    }

    function attachHandlers(id) {
      document.querySelectorAll('[data-reset-calc]').forEach(btn => btn.onclick = () => openCalc(id));
      document.querySelectorAll('[data-save-result]').forEach(btn => btn.onclick = () => saveCurrentResult(btn.dataset.saveResult));

      if (id === 'cable') document.getElementById('calc_cable').onclick = () => {
        const P = n('c_load') * 1000, V = n('c_volt'), sys = n('c_sys'), pf = n('c_pf'), df = n('c_df'), inst = n('c_inst') || 1;
        const current = sys === 3 ? (P * df) / (Math.sqrt(3) * V * pf) : (P * df) / (V * pf);
        const adjusted = current / inst;
        const cable = cableAmpacity.find(c => c.a >= adjusted) || cableAmpacity[cableAmpacity.length - 1];
        const breaker = standardAtLeast(breakerSizes, current * 1.25, '> 630');
        publishResult('calc_cable', L('حساب مقاس الكابل','Cable Sizing'), [
          { label: L('التيار', 'Current'), value: fmt(current, 1) + ' A' },
          { label: L('بعد التصحيح', 'Adjusted'), value: fmt(adjusted, 1) + ' A' },
          { label: L('مقاس الكابل', 'Cable size'), value: cable.mm2 + ' mm²' },
          { label: L('القاطع', 'Breaker'), value: breaker + ' A' }
        ]);
      };

      if (id === 'vdrop') document.getElementById('calc_vdrop').onclick = () => {
        const R = n('v_mat') * n('v_l') / n('v_size');
        const vd = n('v_sys') === 3 ? Math.sqrt(3) * n('v_i') * R : 2 * n('v_i') * R;
        const pct = vd / n('v_volt') * 100;
        const status = pct <= 3 ? L('ممتاز', 'Excellent') : pct <= 5 ? L('مقبول', 'Acceptable') : L('مرتفع', 'Too high');
        publishResult('calc_vdrop', L('الهبوط في الجهد','Voltage Drop'), [
          { label: L('الهبوط', 'Drop'), value: fmt(vd, 2) + ' V' },
          { label: L('النسبة', 'Percent'), value: fmt(pct, 2) + ' %' },
          { label: L('الحالة', 'Status'), value: status }
        ], pct > 5, L('الحد المرجعي: 3% للإنارة و5% للأحمال الأخرى.', 'Reference limit: 3% for lighting and 5% for other loads.'));
      };

      if (id === 'load') {
        const rows = document.getElementById('loadRows');
        const addRow = (name = '', kw = '', df = '1') => {
          const div = document.createElement('div');
          div.className = 'load-row';
          div.innerHTML = '<div class="load-field"><label>' + L('وصف الحمل','Load description') + '</label><input class="load-name" aria-label="' + L('وصف الحمل','Load description') + '" title="' + L('وصف الحمل','Load description') + '" placeholder="' + L('مثال: إنارة','Example: Lighting') + '" value="' + name + '"></div><div class="load-field"><label>' + L('القدرة kW','Power kW') + '</label><input class="load-kw" aria-label="' + L('القدرة بالكيلوواط','Power in kW') + '" title="' + L('القدرة بالكيلوواط','Power in kW') + '" type="number" placeholder="' + L('القدرة kW','Power kW') + '" value="' + kw + '"></div><div class="load-field"><label>' + L('عامل الطلب DF','Demand factor DF') + '</label><input class="load-df" aria-label="' + L('عامل الطلب','Demand factor') + '" title="' + L('عامل الطلب','Demand factor') + '" type="number" step="0.01" placeholder="' + L('عامل الطلب DF','Demand factor DF') + '" value="' + df + '"></div><button class="danger-btn remove-load" type="button" title="' + L('حذف البند','Remove item') + '">×</button>';
          div.querySelector('button').onclick = () => div.remove();
          rows.appendChild(div);
        };
        addRow(L('إنارة','Lighting'), 5, 1);
        addRow(L('مقابس','Sockets'), 8, .8);
        addRow(L('تكييف','HVAC'), 20, .9);
        document.getElementById('addLoadRow').onclick = () => addRow();
        document.getElementById('calc_load').onclick = () => {
          let connected = 0, demand = 0;
          rows.querySelectorAll('.load-row').forEach(row => {
            const kw = Number(row.querySelector('.load-kw').value) || 0;
            const df = Number(row.querySelector('.load-df').value) || 1;
            connected += kw;
            demand += kw * df;
          });
          const current = demand * 1000 / (Math.sqrt(3) * 400 * .85);
          publishResult('calc_load', L('حساب الأحمال','Load Calculation'), [
            { label: L('إجمالي متصل', 'Connected'), value: fmt(connected, 2) + ' kW' },
            { label: L('حمل الطلب', 'Demand'), value: fmt(demand, 2) + ' kW' },
            { label: L('تيار تقديري', 'Estimated I'), value: fmt(current, 1) + ' A' }
          ]);
        };
      }

      if (id === 'pf') document.getElementById('calc_pf').onclick = () => {
        const P = n('pf_p'), c = n('pf_cur'), t = n('pf_tgt');
        const q1 = P * Math.tan(Math.acos(c));
        const q2 = P * Math.tan(Math.acos(t));
        publishResult('calc_pf', L('تصحيح معامل القدرة','Power Factor Correction'), [
          { label: 'Q ' + L('قبل', 'before'), value: fmt(q1, 2) + ' kVAR' },
          { label: 'Q ' + L('بعد', 'after'), value: fmt(q2, 2) + ' kVAR' },
          { label: L('المكثفات المطلوبة', 'Capacitor bank'), value: fmt(q1 - q2, 2) + ' kVAR' }
        ], q1 < q2);
      };

      if (id === 'sc') document.getElementById('calc_sc').onclick = () => {
        const rated = n('sc_kva') * 1000 / (Math.sqrt(3) * n('sc_v'));
        const isc = rated * 100 / n('sc_z');
        publishResult('calc_sc', L('تيار القصر','Short Circuit Current'), [
          { label: L('التيار المقنن', 'Nominal I'), value: fmt(rated, 0) + ' A' },
          { label: 'Isc', value: fmt(isc / 1000, 2) + ' kA' },
          { label: L('قدرة القصر', 'SC Power'), value: fmt(Math.sqrt(3) * n('sc_v') * isc / 1e6, 2) + ' MVA' }
        ], false, L('اختر قاطعا بقدرة قطع Icu أعلى من Isc.', 'Choose a breaker with Icu higher than Isc.'));
      };

      if (id === 'motor') document.getElementById('calc_motor').onclick = () => {
        const flc = n('m_p') * 1000 / (Math.sqrt(3) * n('m_v') * n('m_pf') * (n('m_eff') / 100));
        const breaker = standardAtLeast(breakerSizes, flc * 1.25, '> 630');
        publishResult('calc_motor', L('تيار الموتور الكامل','Motor FLC'), [
          { label: 'FLC', value: fmt(flc, 1) + ' A' },
          { label: L('تيار البدء', 'Starting I'), value: fmt(flc * 6, 0) + ' A' },
          { label: L('القاطع', 'Breaker'), value: breaker + ' A' },
          { label: L('الأوفرلود', 'Overload'), value: fmt(flc * 1.05, 1) + ' - ' + fmt(flc * 1.2, 1) + ' A' }
        ]);
      };

      if (id === 'tx') document.getElementById('calc_tx').onclick = () => {
        const kva = n('tx_p') / n('tx_pf') / (n('tx_load') / 100);
        const tx = standardAtLeast(transformerSizes, kva, '> 4000');
        const ip = tx * 1000 / (Math.sqrt(3) * n('tx_vp') * 1000);
        const is = tx * 1000 / (Math.sqrt(3) * n('tx_vs'));
        publishResult('calc_tx', L('سعة المحول','Transformer Sizing'), [
          { label: L('السعة المحسوبة', 'Calculated'), value: fmt(kva, 0) + ' kVA' },
          { label: L('سعة قياسية', 'Standard'), value: tx + ' kVA' },
          { label: L('تيار ابتدائي', 'Primary I'), value: fmt(ip, 1) + ' A' },
          { label: L('تيار ثانوي', 'Secondary I'), value: fmt(is, 0) + ' A' }
        ]);
      };

      if (id === 'lighting') document.getElementById('calc_light').onclick = () => {
        const area = n('l_len') * n('l_wid');
        const count = (n('l_lux') * area) / (n('l_lm') * n('l_uf') * n('l_mf'));
        const rows = Math.max(1, Math.ceil(Math.sqrt(count * n('l_len') / n('l_wid'))));
        const cols = Math.ceil(count / rows);
        const luminaireCount = Math.ceil(count);
        publishResult('calc_light', L('حساب الإنارة','Lighting Design'), [
          { label: L('المساحة', 'Area'), value: fmt(area, 1) + ' m²' },
          { label: L('عدد اللمبات', 'Luminaires'), value: luminaireCount },
          { label: L('التوزيع', 'Layout'), value: rows + ' × ' + cols },
          { label: 'lm/m²', value: fmt(n('l_lm') * luminaireCount / area, 0) }
        ]);
        document.getElementById('calc_light_result').insertAdjacentHTML('beforeend', lightingSketch(rows, cols, n('l_len'), n('l_wid'), luminaireCount));
      };

      if (id === 'conduit') document.getElementById('calc_conduit').onclick = () => {
        const fill = n('cn_n') === 1 ? .53 : n('cn_n') === 2 ? .31 : .40;
        const cableArea = n('cn_n') * Math.PI * (n('cn_d') / 2) ** 2;
        const conduitDia = 2 * Math.sqrt((cableArea / fill) / Math.PI);
        const standard = standardAtLeast([16,20,25,32,40,50,63,75,90,110], conduitDia, '> 110');
        publishResult('calc_conduit', L('مقاس المواسير','Conduit Sizing'), [
          { label: L('مساحة الكابلات', 'Cable area'), value: fmt(cableArea, 1) + ' mm²' },
          { label: L('قطر محسوب', 'Calculated dia.'), value: fmt(conduitDia, 1) + ' mm' },
          { label: L('مقاس قياسي', 'Standard'), value: standard + ' mm' },
          { label: L('نسبة الملء', 'Fill ratio'), value: fmt(fill * 100, 0) + '%' }
        ]);
      };

      if (id === 'earth') document.getElementById('calc_earth').onclick = () => {
        const d = n('e_d') / 1000;
        const r = (n('e_rho') / (2 * Math.PI * n('e_l'))) * (Math.log(4 * n('e_l') / d) - 1);
        const status = r <= 5 ? L('ممتاز', 'Excellent') : r <= 10 ? L('مقبول', 'Acceptable') : L('يحتاج تحسين', 'Needs improvement');
        publishResult('calc_earth', L('حساب التأريض','Earthing Resistance'), [
          { label: L('مقاومة قضيب واحد', 'Single rod R'), value: fmt(r, 2) + ' Ω' },
          { label: L('عدد القضبان لـ ≤5Ω', 'Rods for ≤5Ω'), value: Math.max(1, Math.ceil(r / 5)) },
          { label: L('الحالة', 'Status'), value: status }
        ], r > 10);
      };

      if (id === 'ups') document.getElementById('calc_ups').onclick = () => {
        const va = n('u_p') / n('u_pf');
        const rec = standardAtLeast([1,1.5,3,5,6,8,10,15,20,30,40,50,60,80,100,120], va * 1.2, '> 120');
        const ah = (n('u_p') * 1000 * (n('u_t') / 60)) / (n('u_bv') * (n('u_eff') / 100) * .8);
        publishResult('calc_ups', L('سعة UPS / البطاريات','UPS / Battery Sizing'), [
          { label: 'UPS VA', value: fmt(va * 1000, 0) + ' VA' },
          { label: L('UPS موصى', 'Recommended UPS'), value: rec + ' kVA' },
          { label: L('سعة البطارية', 'Battery'), value: fmt(ah, 0) + ' Ah' }
        ]);
      };

      if (id === 'cost') document.getElementById('calc_cost').onclick = () => {
        const kwh = n('co_p') * n('co_h') * n('co_d');
        const cur = document.getElementById('co_cur').value || '';
        publishResult('calc_cost', L('تكلفة الاستهلاك','Energy Cost'), [
          { label: L('الاستهلاك', 'Consumption'), value: fmt(kwh, 1) + ' kWh' },
          { label: L('التكلفة', 'Cost'), value: fmt(kwh * n('co_r'), 2) + ' ' + cur },
          { label: L('يومي', 'Daily'), value: fmt(n('co_p') * n('co_h') * n('co_r'), 2) + ' ' + cur }
        ]);
      };
    }

    function loadProjects() {
      try { return JSON.parse(localStorage.getItem('ke_projects') || '[]'); } catch { return []; }
    }
    function saveProjects(projects) { localStorage.setItem('ke_projects', JSON.stringify(projects)); }
    function saveCurrentResult(calcButtonId) {
      if (!state.lastResult) {
        alert(L('احسب أولا ثم احفظ النتيجة.', 'Calculate first, then save the result.'));
        return;
      }
      const select = document.getElementById(calcButtonId + '_project');
      const index = select ? Number(select.value) : -1;
      const projects = loadProjects();
      if (!projects[index]) {
        alert(L('أضف مشروعا أولا من قسم المشاريع.', 'Add a project first from the Projects section.'));
        return;
      }
      projects[index].results = projects[index].results || [];
      projects[index].results.push({ ...state.lastResult });
      saveProjects(projects);
      renderProjects();
      renderDashboard();
      alert(L('تم حفظ النتيجة داخل المشروع.', 'Result saved to the project.'));
    }
    function renderProjects() {
      const projects = loadProjects();
      const list = document.getElementById('projectsList');
      const empty = document.getElementById('projectsEmpty');
      empty.classList.toggle('hidden', projects.length > 0);
      list.innerHTML = projects.map((p, i) => {
        const results = p.results || [];
        return '<article class="project-card"><div class="card-top"><h3>' + esc(p.name) + '</h3><span class="badge ' + p.status + '">' + statusLabel(p.status) + '</span></div><div class="project-meta"><span>' + L('العميل: ', 'Client: ') + esc(p.client || '-') + '</span><span>' + L('النوع: ', 'Type: ') + typeLabel(p.type) + '</span><span>' + L('الحمل: ', 'Load: ') + esc(p.load || 0) + ' kW</span>' + (p.date ? '<span>' + L('التاريخ: ', 'Date: ') + esc(p.date) + '</span>' : '') + '<span>' + L('نتائج محفوظة: ', 'Saved results: ') + results.length + '</span></div>' + (p.notes ? '<p class="muted">' + esc(p.notes) + '</p>' : '') + renderSavedResults(results) + '<div class="project-controls"><button class="ghost-btn" type="button" data-report="' + i + '">' + L('تقرير','Report') + '</button><button class="ghost-btn" type="button" data-edit="' + i + '">' + L('تعديل','Edit') + '</button><button class="danger-btn" type="button" data-delete="' + i + '">' + L('حذف','Delete') + '</button></div></article>';
      }).join('');
      list.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = () => openProjectDialog(Number(btn.dataset.edit)));
      list.querySelectorAll('[data-delete]').forEach(btn => btn.onclick = () => deleteProject(Number(btn.dataset.delete)));
      list.querySelectorAll('[data-report]').forEach(btn => btn.onclick = () => openReport(Number(btn.dataset.report)));
    }
    function renderSavedResults(results) {
      if (!results.length) return '';
      return '<div class="saved-results">' + results.slice(-3).map(r => '<div class="saved-result"><strong>' + esc(r.title) + '</strong><span>' + esc(r.summary) + '</span><small>' + esc(r.at) + '</small></div>').join('') + '</div>';
    }
    function statusLabel(s) {
      return { planning: L('تخطيط','Planning'), active: L('قيد التنفيذ','Active'), hold: L('معلق','On hold'), done: L('منجز','Done') }[s] || s;
    }
    function typeLabel(s) {
      return { residential: L('سكني','Residential'), commercial: L('تجاري','Commercial'), industrial: L('صناعي','Industrial'), infrastructure: L('بنية تحتية','Infrastructure') }[s] || s;
    }
    function openProjectDialog(index = -1) {
      state.editIndex = index;
      const p = index >= 0 ? loadProjects()[index] : { name:'', client:'', type:'residential', status:'planning', load:'', date:'', notes:'' };
      document.getElementById('projectDialogTitle').textContent = index >= 0 ? L('تعديل المشروع','Edit project') : L('مشروع جديد','New project');
      document.getElementById('projectName').value = p.name || '';
      document.getElementById('projectClient').value = p.client || '';
      document.getElementById('projectType').value = p.type || 'residential';
      document.getElementById('projectStatus').value = p.status || 'planning';
      document.getElementById('projectLoad').value = p.load || '';
      document.getElementById('projectDate').value = p.date || '';
      document.getElementById('projectNotes').value = p.notes || '';
      document.getElementById('projectDialog').showModal();
    }
    function deleteProject(index) {
      if (!confirm(L('حذف هذا المشروع؟','Delete this project?'))) return;
      const projects = loadProjects();
      projects.splice(index, 1);
      saveProjects(projects);
      renderProjects();
      renderDashboard();
    }

    function openReport(index) {
      const project = loadProjects()[index];
      if (!project) return;
      document.getElementById('reportTitle').textContent = L('تقرير المشروع','Project Report') + ' - ' + project.name;
      const results = project.results || [];
      document.getElementById('reportContent').innerHTML =
        '<section><h4>' + L('بيانات المشروع','Project Details') + '</h4><ul>' +
        '<li>' + L('الاسم: ','Name: ') + esc(project.name) + '</li>' +
        '<li>' + L('العميل: ','Client: ') + esc(project.client || '-') + '</li>' +
        '<li>' + L('النوع: ','Type: ') + typeLabel(project.type) + '</li>' +
        '<li>' + L('الحالة: ','Status: ') + statusLabel(project.status) + '</li>' +
        '<li>' + L('الحمل: ','Load: ') + esc(project.load || 0) + ' kW</li>' +
        (project.date ? '<li>' + L('التاريخ: ','Date: ') + esc(project.date) + '</li>' : '') +
        '</ul></section>' +
        '<section><h4>' + L('النتائج الهندسية المحفوظة','Saved Engineering Results') + '</h4>' +
        (results.length ? '<ul>' + results.map(r => '<li><strong>' + esc(r.title) + '</strong><br>' + esc(r.summary) + (r.note ? '<br><small>' + esc(r.note) + '</small>' : '') + '<br><small>' + esc(r.at) + '</small></li>').join('') + '</ul>' : '<p class="muted">' + L('لا توجد نتائج محفوظة بعد.','No saved results yet.') + '</p>') +
        '</section>' +
        '<section><h4>' + L('ملاحظات','Notes') + '</h4><p class="muted">' + esc(project.notes || L('لا توجد ملاحظات.','No notes.')) + '</p><p class="note">' + L('هذا التقرير تقديري ويجب مراجعته حسب الكود المعتمد وبيانات المصنع.', 'This report is preliminary and must be verified against the governing code and manufacturer data.') + '</p></section>';
      document.getElementById('reportDialog').showModal();
    }
    function reportText() {
      const content = document.getElementById('reportContent');
      return content ? content.innerText : '';
    }

    function renderReferences() {
      document.getElementById('referencesList').innerHTML = refs.map(r => '<article class="ref-card"><div class="card-top"><span class="small-icon">' + icon(r.icon) + '</span><h3>' + L(r.ar, r.en) + '</h3></div><ul>' + (state.lang === 'ar' ? r.arItems : r.enItems).map(x => '<li>' + x + '</li>').join('') + '</ul></article>').join('');
    }

    function renderTables() {
      const motorRows = [[0.37,.5,1.1],[.75,1,2],[1.5,2,3.5],[2.2,3,5],[3.7,5,8],[5.5,7.5,11.5],[7.5,10,15.5],[11,15,22],[15,20,30],[18.5,25,37],[22,30,44],[30,40,60],[37,50,73],[45,60,89],[55,75,105],[75,100,140],[90,125,165],[110,150,205],[132,180,245],[160,220,295],[200,270,365]];
      const luxRows = lightingLevels.map(item => [L(item.ar, item.en), item.range]);
      const q = state.tableQuery.trim().toLowerCase();
      const filterRows = rows => q ? rows.filter(row => row.join(' ').replace(/<[^>]+>/g, '').toLowerCase().includes(q)) : rows;
      document.getElementById('tablesList').innerHTML =
        tablePanel('🔌 ' + L('سعة تحمل الكابلات النحاسية PVC عند 30°C','Copper PVC Cable Ampacity at 30°C'), [L('المقاس mm²','Size mm²'), L('في الهواء A','In air A'), L('مدفون A','Buried A'), L('في ماسورة A','In conduit A')], filterRows(cableAmpacity.map(c => ['<strong>' + c.mm2 + '</strong>', c.a, fmt(c.a * .7, 0), fmt(c.a * .85, 0)]))) +
        tablePanel('⚙️ ' + L('FLC للموتورات الثلاثية 400V','Three-phase Motor FLC at 400V'), ['kW', 'HP', 'FLC (A)', L('القاطع','Breaker')], filterRows(motorRows.map(m => [m[0], m[1], m[2], '<strong>' + standardAtLeast(breakerSizes, m[2] * 1.25, '> 630') + ' A</strong>']))) +
        tablePanel('💡 ' + L('شدة الإضاءة الموصى بها','Recommended Illuminance'), [L('المكان','Space'), 'lux'], filterRows(luxRows)) +
        '<section class="table-panel"><h3>🏭 ' + L('سعات المحولات القياسية','Standard Transformer Sizes') + '</h3><div class="size-grid">' + transformerSizes.map(s => '<span>' + s + ' kVA</span>').join('') + '</div></section>';
    }
    function tablePanel(title, headers, rows) {
      return '<section class="table-panel"><h3>' + title + '</h3><div class="table-wrap"><table><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>' + rows.map(row => '<tr>' + row.map(cell => '<td>' + cell + '</td>').join('') + '</tr>').join('') + '</tbody></table></div></section>';
    }

    function renderFormulas() {
      document.getElementById('formulasList').innerHTML = formulas.map(f => '<article class="formula-card"><div class="card-top"><span class="small-icon">' + icon(f.icon) + '</span><h3>' + L(f.ar, f.en) + '</h3></div><ul>' + f.items.map(x => '<li><code>' + x + '</code></li>').join('') + '</ul></article>').join('');
    }

    function applyLang() {
      document.documentElement.lang = state.lang;
      document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
      document.body.dir = document.documentElement.dir;
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = strings[state.lang][el.dataset.i18n] || el.textContent);
      document.getElementById('langToggle').textContent = state.lang === 'ar' ? 'EN' : 'عربي';
      document.getElementById('tableSearch').placeholder = L('ابحث في الجداول', 'Search tables');
      document.getElementById('clearTableSearch').textContent = L('مسح', 'Clear');
      document.getElementById('printReport').textContent = L('طباعة / PDF', 'Print / PDF');
      document.getElementById('copyReport').textContent = L('نسخ النص', 'Copy text');
      renderCalculators();
      renderDashboard();
      renderProjects();
      renderReferences();
      renderTables();
      renderFormulas();
      if (state.activeCalc) openCalc(state.activeCalc);
    }

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('section-' + btn.dataset.tab).classList.add('active');
      });
    });
    document.getElementById('closeCalculator').onclick = () => {
      state.activeCalc = null;
      document.getElementById('calculatorPanel').classList.add('hidden');
    };
    document.getElementById('langToggle').onclick = () => {
      state.lang = state.lang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('ke_lang', state.lang);
      applyLang();
    };
    document.getElementById('aboutBtn').onclick = () => alert(strings[state.lang].about);
    document.getElementById('addProjectBtn').onclick = () => openProjectDialog();
    document.getElementById('cancelProject').onclick = () => document.getElementById('projectDialog').close();
    document.getElementById('projectForm').addEventListener('submit', event => {
      event.preventDefault();
      const projects = loadProjects();
      const project = {
        name: document.getElementById('projectName').value.trim(),
        client: document.getElementById('projectClient').value.trim(),
        type: document.getElementById('projectType').value,
        status: document.getElementById('projectStatus').value,
        load: document.getElementById('projectLoad').value,
        date: document.getElementById('projectDate').value,
        notes: document.getElementById('projectNotes').value.trim(),
        results: state.editIndex >= 0 ? (projects[state.editIndex].results || []) : []
      };
      if (!project.name) return;
      if (state.editIndex >= 0) projects[state.editIndex] = project;
      else projects.push(project);
      saveProjects(projects);
      document.getElementById('projectDialog').close();
      renderProjects();
      renderDashboard();
    });
    document.getElementById('tableSearch').addEventListener('input', event => {
      state.tableQuery = event.target.value;
      renderTables();
    });
    document.getElementById('clearTableSearch').onclick = () => {
      state.tableQuery = '';
      document.getElementById('tableSearch').value = '';
      renderTables();
    };
    document.getElementById('closeReport').onclick = () => document.getElementById('reportDialog').close();
    document.getElementById('printReport').onclick = () => window.print();
    document.getElementById('copyReport').onclick = async () => {
      const text = reportText();
      try {
        await navigator.clipboard.writeText(text);
        alert(L('تم نسخ التقرير.', 'Report copied.'));
      } catch {
        alert(text);
      }
    };
    window.printLightingPlan = function() {
      document.body.classList.add('print-plan');
      window.print();
      setTimeout(() => document.body.classList.remove('print-plan'), 250);
    };

    applyLang();
  </script>
</body>
</html>
