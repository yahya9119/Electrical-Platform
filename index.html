<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1d2d50" />
  <title>منصة كهربائيات | Power Engineering Toolkit</title>
  <meta name="description" content="منصة أدوات هندسية للكهرباء: حاسبات، مشاريع، مراجع، جداول ومعادلات لمهندسي القوى الكهربائية." />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fc;
      --surface: #ffffff;
      --surface-2: #eef4fb;
      --ink: #17213c;
      --muted: #6f7c95;
      --line: #dfe7f2;
      --teal: #426aa3;
      --teal-2: #1d2d50;
      --amber: #5d88c8;
      --red: #b94747;
      --green: #2f7d54;
      --blue: #315d9a;
      --shadow: 0 16px 34px rgba(25, 45, 80, .08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      letter-spacing: 0;
    }
    body[dir="ltr"] { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .shell {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      background: linear-gradient(135deg, #182545 0%, #253f70 58%, #5675a5 100%);
      border: 0;
      border-radius: 0 0 16px 16px;
      box-shadow: none;
      min-height: 156px;
      padding: 24px max(24px, calc((100% - 1264px) / 2)) 34px;
      backdrop-filter: blur(12px);
    }
    .brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
    .mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      box-shadow: none;
    }
    .mark svg { width: 34px; height: 34px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 3px 8px rgba(0,0,0,.16)); }
    h1 { margin: 0; color: white; font-size: clamp(1.7rem, 4vw, 2.35rem); line-height: 1.15; font-weight: 950; }
    .subtitle { margin: 6px 0 0; color: rgba(255,255,255,.82); font-size: .98rem; font-weight: 700; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn, .primary-btn, .ghost-btn, .danger-btn {
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 40px;
      padding: 9px 13px;
      font-weight: 800;
      transition: .18s ease;
    }
    .icon-btn { width: 42px; padding: 0; display: grid; place-items: center; background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.10); color: white; }
    .topbar .icon-btn { width: 48px; min-height: 48px; padding: 0; }
    .topbar .ghost-btn { width: 48px; min-height: 48px; padding: 0; border-radius: 999px; background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.10); color: white; }
    .panel .icon-btn, dialog .icon-btn {
      background: var(--surface-2);
      border-color: var(--line);
      color: var(--teal-2);
      font-size: 1.25rem;
      line-height: 1;
    }
    .primary-btn { background: var(--teal); color: white; box-shadow: 0 10px 22px rgba(66,106,163,.22); }
    .ghost-btn { background: rgba(255,255,255,.92); border-color: var(--line); color: var(--teal-2); }
    .danger-btn { background: rgba(185, 71, 71, .12); border-color: rgba(185, 71, 71, .22); color: var(--red); }
    .icon-btn:hover, .ghost-btn:hover { border-color: rgba(66,106,163,.38); transform: translateY(-1px); }
    .primary-btn:hover { background: #355f98; transform: translateY(-1px); }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, auto);
      justify-content: center;
      gap: 46px;
      margin: 0;
      background: var(--surface);
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      padding: 0 max(16px, calc((100% - 1264px) / 2));
      box-shadow: none;
    }
    .tab {
      border: 0;
      min-height: 56px;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }
    .tab.active { background: transparent; color: var(--teal); box-shadow: none; border-bottom-color: var(--teal); }
    .tab:not(.active):hover { background: transparent; color: var(--ink); }

    .section { display: none; }
    .section.active { display: block; animation: rise .25s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    main {
      width: min(1256px, calc(100% - 40px));
      margin: 0 auto;
      padding: 36px 0 44px;
      flex: 1;
    }
    .section-intro { text-align: center; margin: 0 0 32px; }
    .section-intro h2 { margin: 0; color: var(--teal-2); font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 950; }
    .section-intro p { margin: 8px 0 0; color: var(--muted); font-weight: 650; }
    .dashboard { display: none; }
    .summary-card {
      background: rgba(255,253,249,.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(17,17,17,.06);
      padding: 18px;
      min-height: 102px;
    }
    .summary-card.featured {
      background:
        radial-gradient(circle at 16% 18%, rgba(215,168,75,.22), transparent 28%),
        linear-gradient(135deg, #111 0%, #1b1a17 66%, #2a2112 100%);
      color: white;
      border-color: rgba(215,168,75,.26);
      box-shadow: 0 26px 70px rgba(17,17,17,.18);
    }
    .summary-card.featured span { color: #f2cf7b; }
    .summary-card.featured p { color: rgba(255,255,255,.74); }
    .summary-card span { display: block; color: var(--muted); font-size: .78rem; font-weight: 850; }
    .summary-card strong { display: block; margin-top: 7px; font-size: clamp(1.25rem, 2vw, 1.65rem); color: var(--teal-2); }
    .summary-card.featured strong { color: white; }
    .summary-card p { margin: 8px 0 0; color: var(--muted); line-height: 1.55; }
    .category-strip { display: none; }
    .chip {
      border: 1px solid #e4d4bd;
      background: rgba(255,255,255,.9);
      color: var(--teal-2);
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 850;
      box-shadow: 0 8px 20px rgba(17,17,17,.04);
    }
    .chip.active { background: var(--teal-2); color: white; border-color: var(--teal-2); }
    .category-title { display: none; }
    .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    .tool-card, .panel, .ref-card, .project-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: none;
    }
    .tool-card {
      min-height: 86px;
      padding: 16px 18px;
      text-align: start;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 14px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .tool-card::after { display: none; }
    .tool-card:hover { transform: translateY(-2px); border-color: rgba(66,106,163,.34); box-shadow: var(--shadow); }
    .tool-icon, .small-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #edf4fc;
      color: var(--teal);
    }
    .tool-icon svg, .small-icon svg, .mini svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-card h3, .ref-card h3, .project-card h3 { margin: 0 0 6px; font-size: 1.12rem; font-weight: 950; color: var(--teal-2); }
    .tool-card p, .muted { margin: 0; color: var(--muted); line-height: 1.65; }

    .panel { margin-top: 18px; padding: 20px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .panel-head h2 { margin: 0; font-size: 1.35rem; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    label { display: block; margin-bottom: 6px; color: var(--teal-2); font-size: .88rem; font-weight: 850; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      min-height: 42px;
      outline: 0;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(66,106,163,.16); }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .calculator-note {
      margin: 0 0 14px;
      padding: 11px 12px;
      border: 1px solid #d7e4f3;
      border-radius: 14px;
      background: #f4f8fe;
      color: #31527d;
      line-height: 1.6;
    }
    .save-box {
      margin-top: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fbff;
    }
    .result {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      background: #f4f8fe;
      border: 1px solid #d7e4f3;
      border-radius: 14px;
      padding: 12px;
    }
    .result.warning { background: rgba(185, 71, 71, .09); border-color: rgba(185, 71, 71, .25); }
    .metric span { display: block; color: var(--muted); font-size: .76rem; font-weight: 800; }
    .metric strong { display: block; margin-top: 3px; font-size: clamp(1rem, 1.8vw, 1.35rem); color: var(--teal-2); }

    .load-row { display: grid; grid-template-columns: 1.5fr .8fr .8fr 42px; gap: 8px; margin-bottom: 8px; align-items: end; }
    .load-row .danger-btn {
      width: 42px;
      min-height: 42px;
      padding: 0;
    }
    .load-field label {
      display: none;
      margin-bottom: 4px;
      font-size: .78rem;
    }
    .load-head {
      display: grid;
      grid-template-columns: 1.5fr .8fr .8fr 42px;
      gap: 8px;
      margin: 12px 0 6px;
      color: var(--teal-2);
      font-size: .82rem;
      font-weight: 900;
    }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .section-head h2 { margin: 0; font-size: 1.35rem; }
    .empty {
      text-align: center;
      padding: 46px 18px;
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
    }
    .projects-grid, .refs-grid, .formula-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .project-card, .ref-card { padding: 18px; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 11px; font-size: .75rem; font-weight: 850; background: var(--surface-2); color: var(--teal-2); }
    .badge.planning { color: #79510e; background: rgba(201,136,43,.16); }
    .badge.active { color: var(--green); background: rgba(47,125,84,.14); }
    .badge.hold { color: #9a5b2f; background: rgba(154,91,47,.14); }
    .badge.done { color: var(--blue); background: rgba(49,93,154,.14); }
    .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
    .project-meta { display: grid; gap: 6px; margin: 12px 0; color: var(--muted); }
    .project-controls { display: flex; gap: 8px; }
    .project-controls button { flex: 1; }
    .saved-results {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .saved-result {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f4f8fe;
      padding: 10px;
    }
    .saved-result strong { display: block; margin-bottom: 4px; color: var(--teal-2); }
    .saved-result small { display: block; color: var(--muted); margin-top: 4px; }
    .lighting-sketch {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }
    .sketch-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .sketch-actions strong { color: var(--teal-2); }
    .print-plan-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 12px 24px rgba(66,106,163,.22);
    }
    .print-plan-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .engineering-steps {
      margin: 12px 0 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }
    .engineering-steps strong { display: block; margin-bottom: 8px; color: var(--teal-2); }
    .engineering-steps ol { margin: 0; padding-inline-start: 22px; color: var(--muted); line-height: 1.75; }
    .sbc-note {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid #d7e4f3;
      border-radius: var(--radius);
      background: #f4f8fe;
      color: #31527d;
      line-height: 1.7;
      font-weight: 700;
    }
    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .result-actions button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .result-actions svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .calc-error {
      margin-top: 12px;
      padding: 11px 12px;
      border: 1px solid rgba(185,71,71,.25);
      border-radius: var(--radius);
      background: rgba(185,71,71,.09);
      color: var(--red);
      font-weight: 800;
    }
    .sketch-plan {
      width: 100%;
      min-height: 320px;
      border: 2px solid rgba(66,106,163,.55);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(66,106,163,.055) 1px, transparent 1px),
        linear-gradient(0deg, rgba(66,106,163,.055) 1px, transparent 1px),
        #fbfdff;
      background-size: 28px 28px;
    }
    .fixture-card {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f4f8fe;
    }
    .fixture-card div {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
    }
    .fixture-card span { display: block; color: var(--muted); font-size: .76rem; font-weight: 850; }
    .fixture-card strong { display: block; margin-top: 4px; color: var(--teal-2); }
    .plan-print-summary {
      margin: 10px 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .plan-print-summary div {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 9px 10px;
    }
    .plan-print-summary span { display: block; color: var(--muted); font-size: .74rem; font-weight: 850; }
    .plan-print-summary strong { display: block; margin-top: 3px; color: var(--teal-2); }
    .brand-list {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #d7e4f3;
      background: #f4f8fe;
      border-radius: var(--radius);
      color: #31527d;
      line-height: 1.65;
    }
    .brand-list a { color: var(--teal-2); font-weight: 900; text-decoration: underline; text-decoration-color: var(--teal); text-underline-offset: 3px; }
    .sketch-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.6;
    }

    .ref-card ul, .formula-card ul { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .ref-card li { padding-inline-start: 18px; position: relative; color: var(--muted); line-height: 1.55; }
    .ref-card li::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--amber); position: absolute; inset-inline-start: 0; top: .63em; }
    .formula-card { padding: 18px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: none; }
    .formula-card code { display: block; direction: ltr; text-align: left; padding: 10px 12px; background: #17213c; color: #e8f2ff; border-radius: 12px; white-space: normal; }

    .table-panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: none; }
    .table-tools {
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .table-panel h3 { margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 520px; }
    th, td { text-align: start; padding: 11px 14px; border-bottom: 1px solid var(--line); }
    th { color: var(--teal-2); background: #eef4fb; font-size: .88rem; }
    td { color: var(--muted); }
    td strong { color: var(--ink); }
    .size-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; padding: 14px; }
    .size-grid span { padding: 11px 8px; text-align: center; border-radius: 14px; background: #f4f8fe; color: var(--teal-2); font-weight: 900; border: 1px solid var(--line); }

    .footer {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      min-height: 116px;
      padding: 24px max(24px, calc((100% - 1264px) / 2));
      background: #17213c;
      color: white;
      border-radius: 20px 20px 0 0;
      box-shadow: none;
    }
    .footer p { margin: 4px 0 0; color: rgba(255,255,255,.72); }
    .footer strong { color: white; }
    .footer a, .footer .contact span { color: white; text-decoration: none; font-weight: 850; }
    .contact { display: flex; gap: 22px; flex-wrap: wrap; justify-content: start; }
    .contact a { display: inline-flex; align-items: center; gap: 8px; }
    .contact .mini svg { width: 18px; height: 18px; opacity: .82; }

    dialog {
      width: min(540px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 0;
    }
    dialog::backdrop { background: rgba(23,33,60,.42); backdrop-filter: blur(4px); }
    .modal-body { padding: 20px; background: #fff; }
    .modal-body h3 { margin: 0 0 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .modal-actions button { flex: 1; }

    .hidden { display: none !important; }
    .note { margin-top: 8px; color: var(--muted); font-size: .82rem; }
    .ltr { direction: ltr; unicode-bidi: embed; }
    .report-paper { display: grid; gap: 12px; }
    .report-paper h4 { margin: 0; color: var(--teal-2); }
    .report-paper ul { margin: 0; padding-inline-start: 20px; }
    body.print-plan .shell > header,
    body.print-plan .tabs,
    body.print-plan .dashboard,
    body.print-plan .category-strip,
    body.print-plan .card-grid,
    body.print-plan .panel-head,
    body.print-plan .calculator-note,
    body.print-plan .form-grid,
    body.print-plan .row-actions,
    body.print-plan .save-box,
    body.print-plan .footer,
    body.print-plan .result,
    body.print-plan .note:not(.plan-note) {
      display: none !important;
    }
    body.print-plan .section:not(#section-calculators) { display: none !important; }
    body.print-plan #section-calculators { display: block !important; }
    body.print-plan #calculatorPanel {
      display: block !important;
      box-shadow: none;
      border: 0;
      margin: 0;
      padding: 0;
    }
    body.print-plan .lighting-sketch { border: 0; padding: 0; }

    @media (max-width: 900px) {
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .result { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .size-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .shell { width: 100%; padding-top: 0; padding-bottom: 0; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; }
      .footer { grid-template-columns: 1fr; }
      .topbar { padding: 22px 16px 30px; }
      .actions { justify-content: flex-start; align-self: start; }
      .actions .ghost-btn, .actions .icon-btn { flex: 0 0 48px; }
      .contact { display: grid; grid-template-columns: 1fr; justify-content: stretch; }
      .contact a, .contact span { flex: none; }

      const saveBox = document.getElementById(calcId + '_save');
      if (saveBox) saveBox.classList.add('hidden');

      const note = sbc401Note();
      document.getElementById(calcId + '_result').innerHTML = metrics(items, warning) + stepsHtml + '<p class="sbc-note">' + note + '</p>' + resultActions();

        calcId,
        title,
        summary: plainMetrics(items),
        note,
        at: new Date().toLocaleString(state.lang === 'ar' ? 'ar-SA' : 'en-US')

      const saveBox = document.getElementById(calcId + '_save');
      if (saveBox) {
        const select = document.getElementById(calcId + '_project');

    function printHtmlDocument(title, bodyHtml) {
      const win = window.open('', '_blank');
      if (!win) {
        alert(L('اسمح للنوافذ المنبثقة لطباعة التقرير.', 'Allow popups to print the report.'));
        return;
      }
      const reportClass = state.lastResult?.calcId === 'calc_light' ? 'report-lighting' : 'report-standard';
      win.document.write('<!doctype html><html lang="' + (state.lang === 'ar' ? 'ar' : 'en') + '"><head><meta charset="utf-8"><title>' + esc(title) + '</title>' + reportPrintStyles() + '</head><body class="' + reportClass + '"><main class="report-page">' + bodyHtml + '</main></body></html>');
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 250);
    }

      if (!state.lastResult) return '';

        platformReportDescription(),
        printReportNote(),
        activeCalculatorTitle(),
        inputs.text,
        L('النتيجة:', 'Result:'),

    }

    function projectOptions() {
      const projects = loadProjects();
      if (!projects.length) return '<option value="">' + L('أضف مشروعا أولا','Add a project first') + '</option>';

    function publishResult(calcId, title, items, warning = false, note = '') {
      const html = metrics(items, warning) + (note ? '<p class="note">' + note + '</p>' : '') + resultActions();
      document.getElementById(calcId + '_result').innerHTML = html;
      state.lastResult = {
        calcId,
        title,
        summary: plainMetrics(items),
        note,
        at: new Date().toLocaleString(state.lang === 'ar' ? 'ar-SA' : 'en-US')
      };
      const saveBox = document.getElementById(calcId + '_save');
      if (saveBox) {

        useEn: 'ordinary rooms and corridors'

      if (lumens <= 2600) return {
        typeAr: 'داون لايت LED',
        typeEn: 'LED downlight',
        sizeAr: 'قطر 6-8 إنش تقريبا',
        sizeEn: 'Approx. 6-8 inch diameter',
        watts: '18-24 W',
        useAr: 'غرف عادية، فصول صغيرة، مكاتب',
        useEn: 'ordinary rooms, small classrooms, offices'
      };
      if (lumens <= 4500) return {

        typeEn: 'LED ceiling panel',
        sizeAr: '60×60 cm أو 30×120 cm تقريبا',
        sizeEn: 'Approx. 60×60 cm or 30×120 cm',
        watts: '36-45 W',
        useAr: 'فصول، مكاتب، غرف اجتماعات',

    }

        '<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1d2d50"/></marker></defs>' +

      },
      ups() {

      },
      breaker() {
        return '<div class="form-grid">' +
          field('br_load', L('الحمل (kW)', 'Load (kW)'), 50, 'number', 'min="0" step="0.01" title="' + L('أدخل الحمل بالكيلوواط بقيمة موجبة', 'Enter load in kW as a positive value') + '"') +
          field('br_volt', L('الجهد (V)', 'Voltage (V)'), 400, 'number', 'min="1" step="1" title="' + L('أدخل جهد النظام بالفولت', 'Enter system voltage in volts') + '"') +
          selectField('br_phase', L('عدد الأوجه', 'Phase'), [{value:1,label:L('أحادي الطور','Single Phase')},{value:3,label:L('ثلاثي الطور','Three Phase')}]) +
          field('br_pf', L('معامل القدرة', 'Power Factor'), .9, 'number', 'min="0.01" max="1" step="0.01" title="' + L('يجب أن يكون معامل القدرة أكبر من صفر ولا يتجاوز 1', 'Power factor must be above zero and not greater than 1') + '"') +
          field('br_df', L('عامل الطلب (%)', 'Demand Factor (%)'), 100, 'number', 'min="0" max="100" step="0.1" title="' + L('أدخل عامل الطلب كنسبة مئوية', 'Enter demand factor as percentage') + '"') +
          selectField('br_type', L('نوع الحمل', 'Load Type'), [{value:'continuous',label:L('حمل مستمر','Continuous Load')},{value:'non',label:L('حمل غير مستمر','Non-Continuous Load')}]) +
          '</div>' + calcButton('calc_breaker', L('احسب', 'Calculate'));
      },
      panelcap() {
        return '<div class="form-grid">' +
          field('pn_load', L('إجمالي الحمل (kW)', 'Total Load (kW)'), 120, 'number', 'min="0" step="0.01" title="' + L('أدخل إجمالي الحمل بالكيلوواط', 'Enter total load in kW') + '"') +
          field('pn_volt', L('الجهد (V)', 'Voltage (V)'), 400, 'number', 'min="1" step="1" title="' + L('أدخل جهد النظام بالفولت', 'Enter system voltage in volts') + '"') +
          selectField('pn_phase', L('عدد الأوجه', 'Phase'), [{value:1,label:L('أحادي الطور','Single Phase')},{value:3,label:L('ثلاثي الطور','Three Phase')}]) +
          field('pn_pf', L('معامل القدرة', 'Power Factor'), .9, 'number', 'min="0.01" max="1" step="0.01" title="' + L('يجب أن يكون معامل القدرة أكبر من صفر ولا يتجاوز 1', 'Power factor must be above zero and not greater than 1') + '"') +
          field('pn_df', L('عامل الطلب (%)', 'Demand Factor (%)'), 80, 'number', 'min="0" max="100" step="0.1" title="' + L('أدخل عامل الطلب كنسبة مئوية', 'Enter demand factor as percentage') + '"') +
          field('pn_spare', L('السعة الاحتياطية (%)', 'Spare Capacity (%)'), 20, 'number', 'min="0" step="0.1" title="' + L('أدخل نسبة السعة الاحتياطية فوق حمل الطلب', 'Enter spare capacity percentage above demand load') + '"') +
          '</div>' + calcButton('calc_panelcap', L('احسب', 'Calculate'));
      },
      gensize() {
        return '<div class="form-grid">' +
          field('gn_load', L('الحمل المتصل (kW)', 'Connected Load (kW)'), 12, 'number', 'min="0" step="0.01" title="' + L('أدخل الحمل المتصل بالكيلوواط', 'Enter connected load in kW') + '"') +
          field('gn_df', L('عامل الطلب (%)', 'Demand Factor (%)'), 80, 'number', 'min="0" max="100" step="0.1" title="' + L('أدخل عامل الطلب كنسبة مئوية', 'Enter demand factor as percentage') + '"') +
          field('gn_pf', L('معامل القدرة', 'Power Factor'), .8, 'number', 'min="0.01" max="1" step="0.01" title="' + L('يجب أن يكون معامل القدرة أكبر من صفر ولا يتجاوز 1', 'Power factor must be above zero and not greater than 1') + '"') +
          field('gn_motor', L('أكبر موتور بدء (kW)', 'Largest Starting Motor (kW)'), 2, 'number', 'min="0" step="0.01" title="' + L('أدخل قدرة أكبر موتور يبدأ مع المولد، ويمكن إدخال صفر إذا لا يوجد', 'Enter largest starting motor kW, or zero if none') + '"') +
          selectField('gn_start', L('طريقة بدء الموتور', 'Motor Starting Method'), [{value:6,label:'DOL'}, {value:2,label:'Star Delta'}, {value:1.5,label:'Soft Starter'}, {value:1.2,label:'VFD'}]) +
          field('gn_reserve', L('هامش الاحتياط (%)', 'Reserve Margin (%)'), 20, 'number', 'min="0" step="0.1" title="' + L('أدخل هامش الاحتياط كنسبة مئوية', 'Enter reserve margin as percentage') + '"') +
          '</div>' + calcButton('calc_gensize', L('احسب', 'Calculate'));
      }
    };

    function renderCalculators() {
      renderCalculatorCategories();
      const list = state.activeCategory === 'all' ? calculators : calculators.filter(c => c.category === state.activeCategory);
      document.getElementById('calculatorGrid').innerHTML = list.map(c => '<button class="tool-card" type="button" data-calc="' + c.id + '"><span class="tool-icon">' + icon(c.icon) + '</span><span><h3>' + L(c.ar, c.en) + '</h3><p>' + L(c.descAr, c.descEn) + '</p></span></button>').join('');
      document.querySelectorAll('[data-calc]').forEach(btn => btn.addEventListener('click', () => openCalc(btn.dataset.calc)));
    }
    function renderCalculatorCategories() {
      document.getElementById('calculatorCategories').innerHTML = categories.map(c => '<button class="chip ' + (state.activeCategory === c.id ? 'active' : '') + '" type="button" data-category="' + c.id + '">' + L(c.ar, c.en) + '</button>').join('');
      document.querySelectorAll('[data-category]').forEach(btn => btn.onclick = () => {
        state.activeCategory = btn.dataset.category;
        renderCalculators();
      });
    }

    function renderDashboard() {
      const dashboard = document.getElementById('dashboard');
      if (!dashboard) return;
      const projects = loadProjects();
      const resultCount = projects.reduce((sum, p) => sum + ((p.results || []).length), 0);
      const active = projects.filter(p => p.status === 'active').length;
      const lastProject = projects[projects.length - 1];
      const lastResult = state.lastResult ? state.lastResult.title : L('لا توجد نتيجة بعد','No result yet');
      dashboard.innerHTML =
        '<article class="summary-card featured"><span>' + L('مساحة العمل','Workspace') + '</span><strong>' + L('جاهزة للتصميم المبدئي','Ready for preliminary design') + '</strong><p>' + L('ابدأ بالحمل ثم الكابل والهبوط، واحفظ النتائج داخل المشروع لإخراج تقرير مرتب.', 'Start with load, cable and voltage drop, then save results to a project for a clean report.') + '</p></article>' +
        '<article class="summary-card"><span>' + L('المشاريع','Projects') + '</span><strong>' + projects.length + '</strong><p>' + L('النشط: ','Active: ') + active + '</p></article>' +
        '<article class="summary-card"><span>' + L('النتائج المحفوظة','Saved results') + '</span><strong>' + resultCount + '</strong><p>' + esc(lastResult) + '</p></article>' +
        '<article class="summary-card"><span>' + L('آخر مشروع','Latest project') + '</span><strong>' + esc(lastProject ? lastProject.name : L('لا يوجد','None')) + '</strong><p>' + (lastProject ? statusLabel(lastProject.status) : L('أضف مشروعك الأول','Add your first project')) + '</p></article>';
    }

    function openCalc(id) {
      state.activeCalc = id;
      const calc = calculators.find(c => c.id === id);
      document.getElementById('calculatorPanel').classList.remove('hidden');
      document.getElementById('calculatorTitle').textContent = L(calc.ar, calc.en);
      document.getElementById('calculatorBody').innerHTML = '<p class="calculator-note">' + L(calc.noteAr, calc.noteEn) + '</p>' + forms[id]();
      attachHandlers(id);
      document.getElementById('calculatorPanel').scrollIntoView({ block: 'start' });
    }

    function attachHandlers(id) {
      document.querySelectorAll('[data-reset-calc]').forEach(btn => btn.onclick = () => openCalc(id));
      document.querySelectorAll('[data-save-result]').forEach(btn => btn.onclick = () => saveCurrentResult(btn.dataset.saveResult));

      if (id === 'cable') document.getElementById('calc_cable').onclick = () => {
        const P = n('c_load') * 1000, V = n('c_volt'), sys = n('c_sys'), pf = n('c_pf'), df = n('c_df'), inst = n('c_inst') || 1;
        const current = sys === 3 ? (P * df) / (Math.sqrt(3) * V * pf) : (P * df) / (V * pf);
        const adjusted = current / inst;
        const cable = cableAmpacity.find(c => c.a >= adjusted) || cableAmpacity[cableAmpacity.length - 1];
        const breaker = standardAtLeast(breakerSizes, current * 1.25, '> 630');
        publishResult('calc_cable', L('حساب مقاس الكابل','Cable Sizing'), [
          { label: L('التيار', 'Current'), value: fmt(current, 1) + ' A' },
          { label: L('بعد التصحيح', 'Adjusted'), value: fmt(adjusted, 1) + ' A' },
          { label: L('مقاس الكابل', 'Cable size'), value: cable.mm2 + ' mm²' },
          { label: L('القاطع', 'Breaker'), value: breaker + ' A' }
        ]);
      };

      if (id === 'vdrop') document.getElementById('calc_vdrop').onclick = () => {
        const R = n('v_mat') * n('v_l') / n('v_size');
        const vd = n('v_sys') === 3 ? Math.sqrt(3) * n('v_i') * R : 2 * n('v_i') * R;
        const pct = vd / n('v_volt') * 100;
        const status = pct <= 3 ? L('ممتاز', 'Excellent') : pct <= 5 ? L('مقبول', 'Acceptable') : L('مرتفع', 'Too high');
        publishResult('calc_vdrop', L('الهبوط في الجهد','Voltage Drop'), [
          { label: L('الهبوط', 'Drop'), value: fmt(vd, 2) + ' V' },
          { label: L('النسبة', 'Percent'), value: fmt(pct, 2) + ' %' },
          { label: L('الحالة', 'Status'), value: status }
        ], pct > 5, L('الحد المرجعي: 3% للإنارة و5% للأحمال الأخرى.', 'Reference limit: 3% for lighting and 5% for other loads.'));
      };

      if (id === 'load') {
        const rows = document.getElementById('loadRows');
        const addRow = (name = '', kw = '', df = '1') => {
          const div = document.createElement('div');
          div.className = 'load-row';
          div.innerHTML = '<div class="load-field"><label>' + L('وصف الحمل','Load description') + '</label><input class="load-name" aria-label="' + L('وصف الحمل','Load description') + '" title="' + L('وصف الحمل','Load description') + '" placeholder="' + L('مثال: إنارة','Example: Lighting') + '" value="' + name + '"></div><div class="load-field"><label>' + L('القدرة kW','Power kW') + '</label><input class="load-kw" aria-label="' + L('القدرة بالكيلوواط','Power in kW') + '" title="' + L('القدرة بالكيلوواط','Power in kW') + '" type="number" placeholder="' + L('القدرة kW','Power kW') + '" value="' + kw + '"></div><div class="load-field"><label>' + L('عامل الطلب DF','Demand factor DF') + '</label><input class="load-df" aria-label="' + L('عامل الطلب','Demand factor') + '" title="' + L('عامل الطلب','Demand factor') + '" type="number" step="0.01" placeholder="' + L('عامل الطلب DF','Demand factor DF') + '" value="' + df + '"></div><button class="danger-btn remove-load" type="button" title="' + L('حذف البند','Remove item') + '">×</button>';
          div.querySelector('button').onclick = () => div.remove();
          rows.appendChild(div);
        };
        addRow(L('إنارة','Lighting'), 5, 1);
        addRow(L('مقابس','Sockets'), 8, .8);
        addRow(L('تكييف','HVAC'), 20, .9);
        document.getElementById('addLoadRow').onclick = () => addRow();
        document.getElementById('calc_load').onclick = () => {
          let connected = 0, demand = 0;
          rows.querySelectorAll('.load-row').forEach(row => {
            const kw = Number(row.querySelector('.load-kw').value) || 0;
            const df = Number(row.querySelector('.load-df').value) || 1;
            connected += kw;
            demand += kw * df;
          });
          const current = demand * 1000 / (Math.sqrt(3) * 400 * .85);
          publishResult('calc_load', L('حساب الأحمال','Load Calculation'), [
            { label: L('إجمالي متصل', 'Connected'), value: fmt(connected, 2) + ' kW' },
            { label: L('حمل الطلب', 'Demand'), value: fmt(demand, 2) + ' kW' },
            { label: L('تيار تقديري', 'Estimated I'), value: fmt(current, 1) + ' A' }
          ]);
        };
      }

      if (id === 'pf') document.getElementById('calc_pf').onclick = () => {
        const P = n('pf_p'), c = n('pf_cur'), t = n('pf_tgt');
        const q1 = P * Math.tan(Math.acos(c));
        const q2 = P * Math.tan(Math.acos(t));
        publishResult('calc_pf', L('تصحيح معامل القدرة','Power Factor Correction'), [
          { label: 'Q ' + L('قبل', 'before'), value: fmt(q1, 2) + ' kVAR' },
          { label: 'Q ' + L('بعد', 'after'), value: fmt(q2, 2) + ' kVAR' },
          { label: L('المكثفات المطلوبة', 'Capacitor bank'), value: fmt(q1 - q2, 2) + ' kVAR' }
        ], q1 < q2);
      };

      if (id === 'sc') document.getElementById('calc_sc').onclick = () => {
        const rated = n('sc_kva') * 1000 / (Math.sqrt(3) * n('sc_v'));
        const isc = rated * 100 / n('sc_z');
        publishResult('calc_sc', L('تيار القصر','Short Circuit Current'), [
          { label: L('التيار المقنن', 'Nominal I'), value: fmt(rated, 0) + ' A' },
          { label: 'Isc', value: fmt(isc / 1000, 2) + ' kA' },
          { label: L('قدرة القصر', 'SC Power'), value: fmt(Math.sqrt(3) * n('sc_v') * isc / 1e6, 2) + ' MVA' }
        ], false, L('اختر قاطعا بقدرة قطع Icu أعلى من Isc.', 'Choose a breaker with Icu higher than Isc.'));
      };

      if (id === 'motor') document.getElementById('calc_motor').onclick = () => {
        const flc = n('m_p') * 1000 / (Math.sqrt(3) * n('m_v') * n('m_pf') * (n('m_eff') / 100));
        const breaker = standardAtLeast(breakerSizes, flc * 1.25, '> 630');
        publishResult('calc_motor', L('تيار الموتور الكامل','Motor FLC'), [
          { label: 'FLC', value: fmt(flc, 1) + ' A' },
          { label: L('تيار البدء', 'Starting I'), value: fmt(flc * 6, 0) + ' A' },
          { label: L('القاطع', 'Breaker'), value: breaker + ' A' },
          { label: L('الأوفرلود', 'Overload'), value: fmt(flc * 1.05, 1) + ' - ' + fmt(flc * 1.2, 1) + ' A' }
        ]);
      };

      if (id === 'tx') document.getElementById('calc_tx').onclick = () => {
        const kva = n('tx_p') / n('tx_pf') / (n('tx_load') / 100);
        const tx = standardAtLeast(transformerSizes, kva, '> 4000');
        const ip = tx * 1000 / (Math.sqrt(3) * n('tx_vp') * 1000);
        const is = tx * 1000 / (Math.sqrt(3) * n('tx_vs'));
        publishResult('calc_tx', L('سعة المحول','Transformer Sizing'), [
          { label: L('السعة المحسوبة', 'Calculated'), value: fmt(kva, 0) + ' kVA' },
          { label: L('سعة قياسية', 'Standard'), value: tx + ' kVA' },
          { label: L('تيار ابتدائي', 'Primary I'), value: fmt(ip, 1) + ' A' },
          { label: L('تيار ثانوي', 'Secondary I'), value: fmt(is, 0) + ' A' }
        ]);
      };

      if (id === 'lighting') document.getElementById('calc_light').onclick = () => {
        const area = n('l_len') * n('l_wid');
        const count = (n('l_lux') * area) / (n('l_lm') * n('l_uf') * n('l_mf'));
        const rows = Math.max(1, Math.ceil(Math.sqrt(count * n('l_len') / n('l_wid'))));
        const cols = Math.ceil(count / rows);
        const luminaireCount = Math.ceil(count);
        publishResult('calc_light', L('حساب الإنارة','Lighting Design'), [
          { label: L('المساحة', 'Area'), value: fmt(area, 1) + ' m²' },
          { label: L('عدد اللمبات', 'Luminaires'), value: luminaireCount },
          { label: L('التوزيع', 'Layout'), value: rows + ' × ' + cols },
          { label: 'lm/m²', value: fmt(n('l_lm') * luminaireCount / area, 0) }
        ]);
        document.getElementById('calc_light_result').insertAdjacentHTML('beforeend', lightingSketch(rows, cols, n('l_len'), n('l_wid'), luminaireCount));
      };

      if (id === 'conduit') document.getElementById('calc_conduit').onclick = () => {
        const fill = n('cn_n') === 1 ? .53 : n('cn_n') === 2 ? .31 : .40;
        const cableArea = n('cn_n') * Math.PI * (n('cn_d') / 2) ** 2;
        const conduitDia = 2 * Math.sqrt((cableArea / fill) / Math.PI);
        const standard = standardAtLeast([16,20,25,32,40,50,63,75,90,110], conduitDia, '> 110');
        publishResult('calc_conduit', L('مقاس المواسير','Conduit Sizing'), [
          { label: L('مساحة الكابلات', 'Cable area'), value: fmt(cableArea, 1) + ' mm²' },
          { label: L('قطر محسوب', 'Calculated dia.'), value: fmt(conduitDia, 1) + ' mm' },
          { label: L('مقاس قياسي', 'Standard'), value: standard + ' mm' },
          { label: L('نسبة الملء', 'Fill ratio'), value: fmt(fill * 100, 0) + '%' }
        ]);
      };

      if (id === 'earth') document.getElementById('calc_earth').onclick = () => {
        const d = n('e_d') / 1000;
        const r = (n('e_rho') / (2 * Math.PI * n('e_l'))) * (Math.log(4 * n('e_l') / d) - 1);
        const status = r <= 5 ? L('ممتاز', 'Excellent') : r <= 10 ? L('مقبول', 'Acceptable') : L('يحتاج تحسين', 'Needs improvement');
        publishResult('calc_earth', L('حساب التأريض','Earthing Resistance'), [
          { label: L('مقاومة قضيب واحد', 'Single rod R'), value: fmt(r, 2) + ' Ω' },
          { label: L('عدد القضبان لـ ≤5Ω', 'Rods for ≤5Ω'), value: Math.max(1, Math.ceil(r / 5)) },
          { label: L('الحالة', 'Status'), value: status }
        ], r > 10);
      };

      if (id === 'ups') document.getElementById('calc_ups').onclick = () => {
        const va = n('u_p') / n('u_pf');
        const rec = standardAtLeast([1,1.5,3,5,6,8,10,15,20,30,40,50,60,80,100,120], va * 1.2, '> 120');
        const ah = (n('u_p') * 1000 * (n('u_t') / 60)) / (n('u_bv') * (n('u_eff') / 100) * .8);
        publishResult('calc_ups', L('سعة UPS / البطاريات','UPS / Battery Sizing'), [
          { label: 'UPS VA', value: fmt(va * 1000, 0) + ' VA' },
          { label: L('UPS موصى', 'Recommended UPS'), value: rec + ' kVA' },
          { label: L('سعة البطارية', 'Battery'), value: fmt(ah, 0) + ' Ah' }
        ]);
      };

      if (id === 'cost') document.getElementById('calc_cost').onclick = () => {
        const kwh = n('co_p') * n('co_h') * n('co_d');
        const cur = document.getElementById('co_cur').value || '';
        publishResult('calc_cost', L('تكلفة الاستهلاك','Energy Cost'), [
          { label: L('الاستهلاك', 'Consumption'), value: fmt(kwh, 1) + ' kWh' },
          { label: L('التكلفة', 'Cost'), value: fmt(kwh * n('co_r'), 2) + ' ' + cur },
          { label: L('يومي', 'Daily'), value: fmt(n('co_p') * n('co_h') * n('co_r'), 2) + ' ' + cur }
        ]);
      };

      if (id === 'breaker') document.getElementById('calc_breaker').onclick = () => {
        const load = n('br_load');
        const voltage = n('br_volt');
        const phase = n('br_phase');
        const pf = n('br_pf');
        const demandPercent = n('br_df');
        const isContinuous = document.getElementById('br_type').value === 'continuous';
        if (!validatePositiveCalc('calc_breaker', [
          { ok: load >= 0, message: L('الحمل يجب ألا يكون قيمة سالبة.', 'Load cannot be negative.') },
          { ok: voltage > 0, message: L('الجهد يجب أن يكون أكبر من صفر.', 'Voltage must be greater than zero.') },
          { ok: pf > 0 && pf <= 1, message: L('معامل القدرة يجب أن يكون أكبر من صفر ولا يتجاوز 1.', 'Power factor must be greater than zero and not above 1.') },
          { ok: demandPercent >= 0 && demandPercent <= 100, message: L('عامل الطلب يجب أن يكون بين 0% و100%.', 'Demand factor must be between 0% and 100%.') }
        ])) return;
        const demandFactor = demandPercent / 100;
        const demandLoad = load * demandFactor;
        const current = phase === 3 ? demandLoad * 1000 / (Math.sqrt(3) * voltage * pf) : demandLoad * 1000 / (voltage * pf);
        const minimumBreaker = isContinuous ? current * 1.25 : current;
        const breaker = standardSelection(engineeringBreakerSizes, minimumBreaker, 'A');
        engineeringResult('calc_breaker', L('اختيار القاطع الكهربائي','Breaker Sizing'), [
          { label: L('حمل الطلب', 'Demand Load'), value: fmt(demandLoad, 2) + ' kW' },
          { label: L('تيار الحمل', 'Load Current'), value: fmt(current, 2) + ' A' },
          { label: L('تيار القاطع الأدنى', 'Minimum Breaker Current'), value: fmt(minimumBreaker, 2) + ' A' },
          { label: L('القاطع المقترح', 'Recommended Breaker'), value: breaker.label }
        ], [
          L('حمل الطلب = الحمل × عامل الطلب = ', 'Demand Load = Load × Demand Factor = ') + fmt(load, 2) + ' × ' + fmt(demandFactor, 2) + ' = ' + fmt(demandLoad, 2) + ' kW',
          phase === 3
            ? L('تيار ثلاثي الطور = حمل الطلب × 1000 / (√3 × الجهد × معامل القدرة) = ', 'Three-phase current = Demand Load × 1000 / (√3 × Voltage × PF) = ') + fmt(current, 2) + ' A'
            : L('تيار أحادي الطور = حمل الطلب × 1000 / (الجهد × معامل القدرة) = ', 'Single-phase current = Demand Load × 1000 / (Voltage × PF) = ') + fmt(current, 2) + ' A',
          isContinuous
            ? L('الحمل مستمر: تيار القاطع الأدنى = تيار الحمل × 1.25 = ', 'Continuous load: minimum breaker current = load current × 1.25 = ') + fmt(minimumBreaker, 2) + ' A'
            : L('الحمل غير مستمر: تيار القاطع الأدنى = تيار الحمل = ', 'Non-continuous load: minimum breaker current = load current = ') + fmt(minimumBreaker, 2) + ' A',
          L('تم اختيار أقرب قاطع قياسي أعلى: ', 'Nearest higher standard breaker selected: ') + breaker.label
        ], breaker.warning);
      };

      if (id === 'panelcap') document.getElementById('calc_panelcap').onclick = () => {
        const load = n('pn_load');
        const voltage = n('pn_volt');
        const phase = n('pn_phase');
        const pf = n('pn_pf');
        const demandPercent = n('pn_df');
        const sparePercent = n('pn_spare');
        if (!validatePositiveCalc('calc_panelcap', [
          { ok: load >= 0, message: L('إجمالي الحمل يجب ألا يكون قيمة سالبة.', 'Total load cannot be negative.') },
          { ok: voltage > 0, message: L('الجهد يجب أن يكون أكبر من صفر.', 'Voltage must be greater than zero.') },
          { ok: pf > 0 && pf <= 1, message: L('معامل القدرة يجب أن يكون أكبر من صفر ولا يتجاوز 1.', 'Power factor must be greater than zero and not above 1.') },
          { ok: demandPercent >= 0 && demandPercent <= 100, message: L('عامل الطلب يجب أن يكون بين 0% و100%.', 'Demand factor must be between 0% and 100%.') },
          { ok: sparePercent >= 0, message: L('السعة الاحتياطية يجب ألا تكون قيمة سالبة.', 'Spare capacity cannot be negative.') }
        ])) return;
        const demandFactor = demandPercent / 100;
        const spareFactor = sparePercent / 100;
        const demandLoad = load * demandFactor;
        const panelCapacity = demandLoad * (1 + spareFactor);
        const panelCurrent = phase === 3 ? panelCapacity * 1000 / (Math.sqrt(3) * voltage * pf) : panelCapacity * 1000 / (voltage * pf);
        const breaker = standardSelection(engineeringBreakerSizes, panelCurrent, 'A');
        const busbar = breaker.value ? standardSelection(panelRatings, breaker.value, 'A') : standardSelection(panelRatings, panelCurrent, 'A');
        engineeringResult('calc_panelcap', L('سعة لوحة التوزيع','Panel Capacity'), [
          { label: L('حمل الطلب', 'Demand Load'), value: fmt(demandLoad, 2) + ' kW' },
          { label: L('سعة اللوحة', 'Panel Capacity'), value: fmt(panelCapacity, 2) + ' kW' },
          { label: L('تيار اللوحة', 'Panel Current'), value: fmt(panelCurrent, 2) + ' A' },
          { label: L('القاطع الرئيسي', 'Main Breaker'), value: breaker.label },
          { label: L('تصنيف البسبار', 'Busbar Rating'), value: busbar.label }
        ], [
          L('حمل الطلب = إجمالي الحمل × عامل الطلب = ', 'Demand Load = Total Load × Demand Factor = ') + fmt(load, 2) + ' × ' + fmt(demandFactor, 2) + ' = ' + fmt(demandLoad, 2) + ' kW',
          L('سعة اللوحة = حمل الطلب × (1 + السعة الاحتياطية) = ', 'Panel Capacity = Demand Load × (1 + Spare Capacity) = ') + fmt(demandLoad, 2) + ' × (1 + ' + fmt(spareFactor, 2) + ') = ' + fmt(panelCapacity, 2) + ' kW',
          phase === 3
            ? L('تيار اللوحة ثلاثي الطور = سعة اللوحة × 1000 / (√3 × الجهد × معامل القدرة) = ', 'Three-phase panel current = Panel Capacity × 1000 / (√3 × Voltage × PF) = ') + fmt(panelCurrent, 2) + ' A'
            : L('تيار اللوحة أحادي الطور = سعة اللوحة × 1000 / (الجهد × معامل القدرة) = ', 'Single-phase panel current = Panel Capacity × 1000 / (Voltage × PF) = ') + fmt(panelCurrent, 2) + ' A',
          L('تم اختيار أقرب قاطع رئيسي قياسي أعلى: ', 'Nearest higher standard main breaker selected: ') + breaker.label,
          L('تصنيف البسبار مساو أو أعلى من القاطع الرئيسي: ', 'Busbar rating is equal to or higher than the main breaker: ') + busbar.label
        ], breaker.warning || busbar.warning);
      };

      if (id === 'gensize') document.getElementById('calc_gensize').onclick = () => {
        const connectedLoad = n('gn_load');
        const demandPercent = n('gn_df');
        const pf = n('gn_pf');
        const motorKw = n('gn_motor');
        const startFactor = n('gn_start');
        const reservePercent = n('gn_reserve');
        if (!validatePositiveCalc('calc_gensize', [
          { ok: connectedLoad >= 0, message: L('الحمل المتصل يجب ألا يكون قيمة سالبة.', 'Connected load cannot be negative.') },
          { ok: demandPercent >= 0 && demandPercent <= 100, message: L('عامل الطلب يجب أن يكون بين 0% و100%.', 'Demand factor must be between 0% and 100%.') },
          { ok: pf > 0 && pf <= 1, message: L('معامل القدرة يجب أن يكون أكبر من صفر ولا يتجاوز 1.', 'Power factor must be greater than zero and not above 1.') },
          { ok: motorKw >= 0, message: L('قدرة أكبر موتور يجب ألا تكون قيمة سالبة.', 'Largest motor power cannot be negative.') },
          { ok: reservePercent >= 0, message: L('هامش الاحتياط يجب ألا يكون قيمة سالبة.', 'Reserve margin cannot be negative.') }
        ])) return;
        const demandFactor = demandPercent / 100;
        const reserveFactor = reservePercent / 100;
        const runningKw = connectedLoad * demandFactor;
        const runningKva = runningKw / pf;
        const motorKva = motorKw / pf;
        const startingMotorKva = motorKva * startFactor;
        const requiredKva = runningKva + startingMotorKva;
        const finalKva = requiredKva * (1 + reserveFactor);
        const generator = standardSelection(generatorSizes, finalKva, 'kVA');
        const genValue = generator.value ?? finalKva;
        const category = genValue <= 20
          ? L('سكني / حمل صغير', 'Residential / Small Load')
          : genValue <= 100
            ? L('تجاري صغير', 'Small Commercial')
            : genValue <= 500
              ? L('تجاري / منشأة', 'Commercial / Facility')
              : L('صناعي / مشروع كبير', 'Industrial / Large Project');
        engineeringResult('calc_gensize', L('حجم مولد الطوارئ','Generator Sizing'), [
          { label: L('حمل التشغيل', 'Running Load'), value: fmt(runningKw, 2) + ' kW' },
          { label: L('حمل التشغيل', 'Running Load'), value: fmt(runningKva, 2) + ' kVA' },
          { label: L('بدء الموتور', 'Starting Motor'), value: fmt(startingMotorKva, 2) + ' kVA' },
          { label: L('المولد المطلوب', 'Required Generator'), value: fmt(requiredKva, 2) + ' kVA' },
          { label: L('المولد المقترح', 'Recommended Generator'), value: generator.label },
          { label: L('التصنيف', 'Category'), value: category }
        ], [
          L('حمل التشغيل kW = الحمل المتصل × عامل الطلب = ', 'Running Load kW = Connected Load × Demand Factor = ') + fmt(connectedLoad, 2) + ' × ' + fmt(demandFactor, 2) + ' = ' + fmt(runningKw, 2) + ' kW',
          L('حمل التشغيل kVA = حمل التشغيل kW / معامل القدرة = ', 'Running Load kVA = Running Load kW / PF = ') + fmt(runningKva, 2) + ' kVA',
          L('kVA الموتور = قدرة أكبر موتور / معامل القدرة = ', 'Motor kVA = Largest Starting Motor kW / PF = ') + fmt(motorKva, 2) + ' kVA',
          L('kVA بدء الموتور = kVA الموتور × معامل البدء = ', 'Starting Motor kVA = Motor kVA × Starting Factor = ') + fmt(startingMotorKva, 2) + ' kVA',
          L('kVA المولد المطلوب = حمل التشغيل kVA + kVA بدء الموتور = ', 'Required Generator kVA = Running Load kVA + Starting Motor kVA = ') + fmt(requiredKva, 2) + ' kVA',
          L('kVA النهائي = المطلوب × (1 + هامش الاحتياط) = ', 'Final Generator kVA = Required × (1 + Reserve Margin) = ') + fmt(finalKva, 2) + ' kVA',
          L('تم اختيار أقرب حجم قياسي أعلى وتصنيفه: ', 'Nearest higher standard size selected and classified: ') + generator.label + ' - ' + category
        ], generator.warning);
      };
    }

    function loadProjects() {
      try { return JSON.parse(localStorage.getItem('ke_projects') || '[]'); } catch { return []; }
    }
    function saveProjects(projects) { localStorage.setItem('ke_projects', JSON.stringify(projects)); }
    function saveCurrentResult(calcButtonId) {
      if (!state.lastResult) {
        alert(L('احسب أولا ثم احفظ النتيجة.', 'Calculate first, then save the result.'));
        return;
      }
      const select = document.getElementById(calcButtonId + '_project');
      const index = select ? Number(select.value) : -1;
      const projects = loadProjects();
      if (!projects[index]) {
        alert(L('أضف مشروعا أولا من قسم المشاريع.', 'Add a project first from the Projects section.'));
        return;
      }
      projects[index].results = projects[index].results || [];
      projects[index].results.push({ ...state.lastResult });
      saveProjects(projects);
      renderProjects();
      renderDashboard();
      alert(L('تم حفظ النتيجة داخل المشروع.', 'Result saved to the project.'));
    }
    function renderProjects() {
      const projects = loadProjects();
      const list = document.getElementById('projectsList');
      const empty = document.getElementById('projectsEmpty');
      empty.classList.toggle('hidden', projects.length > 0);
      list.innerHTML = projects.map((p, i) => {
        const results = p.results || [];
        return '<article class="project-card"><div class="card-top"><h3>' + esc(p.name) + '</h3><span class="badge ' + p.status + '">' + statusLabel(p.status) + '</span></div><div class="project-meta"><span>' + L('العميل: ', 'Client: ') + esc(p.client || '-') + '</span><span>' + L('النوع: ', 'Type: ') + typeLabel(p.type) + '</span><span>' + L('الحمل: ', 'Load: ') + esc(p.load || 0) + ' kW</span>' + (p.date ? '<span>' + L('التاريخ: ', 'Date: ') + esc(p.date) + '</span>' : '') + '<span>' + L('نتائج محفوظة: ', 'Saved results: ') + results.length + '</span></div>' + (p.notes ? '<p class="muted">' + esc(p.notes) + '</p>' : '') + renderSavedResults(results) + '<div class="project-controls"><button class="ghost-btn" type="button" data-report="' + i + '">' + L('تقرير','Report') + '</button><button class="ghost-btn" type="button" data-edit="' + i + '">' + L('تعديل','Edit') + '</button><button class="danger-btn" type="button" data-delete="' + i + '">' + L('حذف','Delete') + '</button></div></article>';
      }).join('');
      list.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = () => openProjectDialog(Number(btn.dataset.edit)));
      list.querySelectorAll('[data-delete]').forEach(btn => btn.onclick = () => deleteProject(Number(btn.dataset.delete)));
      list.querySelectorAll('[data-report]').forEach(btn => btn.onclick = () => openReport(Number(btn.dataset.report)));
    }
    function renderSavedResults(results) {
      if (!results.length) return '';
      return '<div class="saved-results">' + results.slice(-3).map(r => '<div class="saved-result"><strong>' + esc(r.title) + '</strong><span>' + esc(r.summary) + '</span><small>' + esc(r.at) + '</small></div>').join('') + '</div>';
    }
    function statusLabel(s) {
      return { planning: L('تخطيط','Planning'), active: L('قيد التنفيذ','Active'), hold: L('معلق','On hold'), done: L('منجز','Done') }[s] || s;
    }
    function typeLabel(s) {
      return { residential: L('سكني','Residential'), commercial: L('تجاري','Commercial'), industrial: L('صناعي','Industrial'), infrastructure: L('بنية تحتية','Infrastructure') }[s] || s;
    }
    function openProjectDialog(index = -1) {
      state.editIndex = index;
      const p = index >= 0 ? loadProjects()[index] : { name:'', client:'', type:'residential', status:'planning', load:'', date:'', notes:'' };
      document.getElementById('projectDialogTitle').textContent = index >= 0 ? L('تعديل المشروع','Edit project') : L('مشروع جديد','New project');
      document.getElementById('projectName').value = p.name || '';
      document.getElementById('projectClient').value = p.client || '';
      document.getElementById('projectType').value = p.type || 'residential';
      document.getElementById('projectStatus').value = p.status || 'planning';
      document.getElementById('projectLoad').value = p.load || '';
      document.getElementById('projectDate').value = p.date || '';
      document.getElementById('projectNotes').value = p.notes || '';
      document.getElementById('projectDialog').showModal();
    }
    function deleteProject(index) {
      if (!confirm(L('حذف هذا المشروع؟','Delete this project?'))) return;
      const projects = loadProjects();
      projects.splice(index, 1);
      saveProjects(projects);
      renderProjects();
      renderDashboard();
    }

    function openReport(index) {
      const project = loadProjects()[index];
      if (!project) return;
      document.getElementById('reportTitle').textContent = L('تقرير المشروع','Project Report') + ' - ' + project.name;
      const results = project.results || [];
      document.getElementById('reportContent').innerHTML =
        '<section><h4>' + L('بيانات المشروع','Project Details') + '</h4><ul>' +
        '<li>' + L('الاسم: ','Name: ') + esc(project.name) + '</li>' +
        '<li>' + L('العميل: ','Client: ') + esc(project.client || '-') + '</li>' +
        '<li>' + L('النوع: ','Type: ') + typeLabel(project.type) + '</li>' +
        '<li>' + L('الحالة: ','Status: ') + statusLabel(project.status) + '</li>' +
        '<li>' + L('الحمل: ','Load: ') + esc(project.load || 0) + ' kW</li>' +
        (project.date ? '<li>' + L('التاريخ: ','Date: ') + esc(project.date) + '</li>' : '') +
        '</ul></section>' +
        '<section><h4>' + L('النتائج الهندسية المحفوظة','Saved Engineering Results') + '</h4>' +
        (results.length ? '<ul>' + results.map(r => '<li><strong>' + esc(r.title) + '</strong><br>' + esc(r.summary) + (r.note ? '<br><small>' + esc(r.note) + '</small>' : '') + '<br><small>' + esc(r.at) + '</small></li>').join('') + '</ul>' : '<p class="muted">' + L('لا توجد نتائج محفوظة بعد.','No saved results yet.') + '</p>') +
        '</section>' +
        '<section><h4>' + L('ملاحظات','Notes') + '</h4><p class="muted">' + esc(project.notes || L('لا توجد ملاحظات.','No notes.')) + '</p><p class="note">' + L('هذا التقرير تقديري ويجب مراجعته حسب الكود المعتمد وبيانات المصنع.', 'This report is preliminary and must be verified against the governing code and manufacturer data.') + '</p></section>';
      document.getElementById('reportDialog').showModal();
    }
    function reportText() {
      const content = document.getElementById('reportContent');
      return content ? content.innerText : '';
    }

    function renderReferences() {
      document.getElementById('referencesList').innerHTML = refs.map(r => '<article class="ref-card"><div class="card-top"><span class="small-icon">' + icon(r.icon) + '</span><h3>' + L(r.ar, r.en) + '</h3></div><ul>' + (state.lang === 'ar' ? r.arItems : r.enItems).map(x => '<li>' + x + '</li>').join('') + '</ul></article>').join('');

        tablePanel('⚙️ ' + L('FLC للموتورات الثلاثية 400V','Three-phase Motor FLC at 400V'), ['kW', 'HP', 'FLC (A)', L('القاطع','Breaker')], filterRows(motorRows.map(m => [m[0], m[1], m[2], '<strong>' + standardAtLeast(breakerSizes, m[2] * 1.25, '> 630') + ' A</strong>']))) +
        tablePanel('💡 ' + L('شدة الإضاءة الموصى بها','Recommended Illuminance'), [L('المكان','Space'), 'lux'], filterRows(luxRows)) +
        '<section class="table-panel"><h3>🏭 ' + L('سعات المحولات القياسية','Standard Transformer Sizes') + '</h3><div class="size-grid">' + transformerSizes.map(s => '<span>' + s + ' kVA</span>').join('') + '</div></section>';

        client: document.getElementById('projectClient').value.trim(),
        type: document.getElementById('projectType').value,
        status: document.getElementById('projectStatus').value,
        load: document.getElementById('projectLoad').value,
        date: document.getElementById('projectDate').value,

    document.getElementById('printReport').onclick = () => window.print();
    document.getElementById('copyReport').onclick = async () => {
      const text = reportText();
      try {
        await navigator.clipboard.writeText(text);
        alert(L('تم نسخ التقرير.', 'Report copied.'));
      } catch {
        alert(text);
      }
    };
    window.copyEngineeringResult = async function() {
      if (!state.lastResult) {
        alert(L('احسب أولا ثم انسخ النتيجة.', 'Calculate first, then copy the result.'));
        return;
      }
      const text = currentReportText();
      try {
        await navigator.clipboard.writeText(text);
        alert(L('تم نسخ النتيجة.', 'Result copied.'));
      } catch {
        alert(text);
      }
    };
    window.printEngineeringResult = function() {
      if (!state.lastResult) {
        alert(L('احسب أولا ثم اطبع النتيجة.', 'Calculate first, then print the result.'));
        return;
      }
      printHtmlDocument(activeCalculatorTitle(), currentReportHtml());
    };
    window.printLightingPlan = function() {
      if (!state.lastResult || state.lastResult.calcId !== 'calc_light') {
        alert(L('احسب الإنارة أولا ثم اطبع المخطط.', 'Calculate lighting first, then print the plan.'));
        return;
      }
      printHtmlDocument(L('المخطط التنفيذي للإنارة','Lighting execution plan'), currentReportHtml());
    };

    applyLang();
  </script>
</body>
</html>
